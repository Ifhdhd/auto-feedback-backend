<!DOCTYPE html>
<html>
<head>
  <title>Auto Feedback</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0f1a;
      color: white;
    }

    .container {
      padding: 15px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      border-radius: 8px;
      border: none;
      background: #1e293b;
      color: white;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(90deg, red, darkred);
      color: white;
      font-weight: bold;
    }

    .actions button {
      width: 32%;
      margin-right: 1%;
      background: #1e293b;
    }

    .card {
      background: #1e293b;
      margin-top: 10px;
      padding: 12px;
      border-radius: 10px;
    }

    .row {
      display: flex;
      align-items: center;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 8px;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>LOGIN</h2>

  <input id="account" placeholder="No HP">
  <input id="password" placeholder="Password" type="password">
  <button onclick="login()">MASUK</button>

  <hr>

  <div class="actions">
    <button onclick="loadTasks()">Load Task</button>
    <button onclick="runAuto()">Auto</button>
    <button onclick="loadNotif()">Notif</button>
  </div>

  <div id="list"></div>

</div>

<script>

const BASE = "https://auto-feedback-backend.onrender.com";
let user = "";

// warna dot
function getDotColor(diff){
  if(diff >= 10) return "red";
  return "green";
}

// LOGIN
async function login(){
  user = document.getElementById("account").value;

  if(!user){
    alert("Isi nomor dulu");
    return;
  }

  const res = await fetch(BASE + "/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      account: user,
      password: document.getElementById("password").value
    })
  });

  const data = await res.json();

  if(data.success){
    alert("Login berhasil");
  } else {
    alert("Login gagal");
  }
}

// LOAD TASK
async function loadTasks(){
  if(!user){
    alert("Login dulu");
    return;
  }

  document.getElementById("list").innerHTML = "Loading...";

  try {
    const res = await fetch(BASE + "/tasks/" + user);
    const data = await res.json();

    console.log("TASK:", data);

    const list = document.getElementById("list");
    list.innerHTML = "";

    if(!data.success || !data.data || data.data.length === 0){
      list.innerHTML = "Tidak ada data";
      return;
    }

    data.data.forEach(t => {

      const color = getDotColor(t.diffDays || 0);

      list.innerHTML += `
        <div class="card">
          <div class="row">
            <div class="dot" style="background:${color}"></div>
            <b>${t.userName}</b>
          </div>

          <div>Debt: ${t.formatDebt}</div>
          <div>DPD: ${t.dpd}</div>
          <div>${t.diffDays} hari sejak feedback</div>
        </div>
      `;
    });

  } catch(e){
    alert("Gagal load task");
    console.log(e);
  }
}

// AUTO FEEDBACK
async function runAuto(){
  if(!user){
    alert("Login dulu");
    return;
  }

  alert("Proses auto dimulai...");

  try {
    await fetch(BASE + "/auto-feedback/" + user);
    alert("Auto selesai");
  } catch(e){
    alert("Auto gagal");
  }
}

// NOTIF
async function loadNotif(){
  if(!user){
    alert("Login dulu");
    return;
  }

  try {
    const res = await fetch(BASE + "/notif/" + user);
    const data = await res.json();

    if(!data.data || data.data.length === 0){
      alert("Tidak ada notif");
      return;
    }

    alert(data.data.join("\n"));

  } catch(e){
    alert("Gagal ambil notif");
  }
}

</script>

</body>
</html>
