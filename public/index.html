<!DOCTYPE html>
<html>
<head>
  <title>Auto Feedback App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #05070f;
      color: white;
    }

    .screen {
      display: none;
      height: 100vh;
      overflow: hidden;
    }

    .active {
      display: block;
    }

    /* LOGIN FULL SCREEN */
    .login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: radial-gradient(circle at center, #0b1120, #05070f);
    }

    .login-box {
      width: 90%;
      max-width: 320px;
      background: rgba(255,255,255,0.05);
      padding: 25px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 30px rgba(255,0,0,0.3);
    }

    .header {
      text-align: center;
      font-size: 20px;
      margin-bottom: 20px;
      color: red;
    }

    input {
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      border-radius: 10px;
      border: none;
      background: #121826;
      color: white;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(90deg, red, darkred);
      color: white;
      font-weight: bold;
    }

    /* APP SCREEN */
    .app-screen {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .content {
      flex: 1;
      overflow: auto;
      padding: 20px;
      padding-bottom: 80px;
    }

    .card {
      background: #121826;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .row {
      display: flex;
      align-items: center;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 8px;
    }

    /* NAV */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #0b1120;
      display: flex;
    }

    .bottom-nav button {
      flex: 1;
      background: none;
      color: white;
      border: none;
      padding: 10px;
      font-size: 12px;
    }

    /* LOADING */
    .loading {
      position: fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background: rgba(0,0,0,0.7);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:999;
    }

    .spinner {
      border: 4px solid #333;
      border-top: 4px solid red;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    /* DRAWER LOG */
    .drawer {
      position: fixed;
      top: 0;
      right: -100%;
      width: 85%;
      height: 100%;
      background: #0b1120;
      transition: 0.4s;
      z-index: 1000;
      overflow: auto;
    }

    .drawer.open {
      right: 0;
    }

    .drawer-header {
      padding: 15px;
      border-bottom: 1px solid #222;
      display: flex;
      justify-content: space-between;
    }

    .log-item {
      padding: 10px;
      border-bottom: 1px solid #111;
      font-size: 12px;
    }

    .success { color: #00ff9d; }
    .error { color: red; }
    .skip { color: orange; }
    .info { color: #4cc9f0; }

  </style>
</head>

<body>

<div id="loading" class="loading">
  <div class="spinner"></div>
</div>

<!-- LOGIN ONLY -->
<div id="loginScreen" class="screen active login-screen">
  <div class="login-box">
    <div class="header">SYSTEM LOGIN</div>

    <input id="account" placeholder="No HP">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">MASUK</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="appScreen" class="screen app-screen">

  <div class="content" id="homePage">
    <h3>DASHBOARD</h3>
    <button onclick="loadTasks()">LOAD TASK</button>
    <div id="taskList"></div>
  </div>

  <div class="content" id="autoPage" style="display:none;">
    <h3>AUTO FEEDBACK</h3>
    <button onclick="startAuto()">START AUTO</button>
    <div id="successList"></div>
  </div>

</div>

<!-- NAV -->
<div id="nav" class="bottom-nav" style="display:none;">
  <button onclick="goHome()">🏠<br>Home</button>
  <button onclick="goAuto()">⚡<br>Auto</button>
  <button onclick="openDrawer()">📋<br>Log</button>
</div>

<!-- LOG DRAWER -->
<div id="drawer" class="drawer">
  <div class="drawer-header">
    <span>LOG</span>
    <button onclick="closeDrawer()">X</button>
  </div>
  <div id="logContainer"></div>
</div>

<script>

const BASE = "https://auto-feedback-backend-1.onrender.com";
let user = "";

// LOADING
function showLoading(s){
  document.getElementById("loading").style.display = s ? "flex" : "none";
}

// LOGIN
async function login(){
  user = document.getElementById("account").value;

  showLoading(true);

  const res = await fetch(BASE + "/login",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      account:user,
      password:document.getElementById("password").value
    })
  });

  const data = await res.json();
  showLoading(false);

  if(data.success){
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("appScreen").classList.add("active");
    document.getElementById("nav").style.display = "flex";
    addLog("Login sukses","success");
  } else {
    addLog("Login gagal","error");
  }
}

// TASK
async function loadTasks(){
  const res = await fetch(BASE + "/tasks/" + user);
  const data = await res.json();

  const list = document.getElementById("taskList");
  list.innerHTML = "";

  data.data.forEach(t=>{
    const hari = t.diffDays || 0;
    const color = hari >= 10 ? "red" : "green";

    list.innerHTML += `
      <div class="card">
        <div class="row">
          <div class="dot" style="background:${color}"></div>
          <b>${t.userName}</b>
        </div>
        <div>${hari} hari sejak feedback</div>
      </div>
    `;
  });
}

// AUTO
async function startAuto(){
  const res = await fetch(BASE + "/tasks/" + user);
  const data = await res.json();

  for(let t of data.data){

    if((t.diffDays||0) < 10){
      addLog("Skip "+t.userName,"skip");
      continue;
    }

    await fetch(BASE + "/auto-feedback/" + user);
    addLog("Success "+t.userName,"success");

    document.getElementById("successList").innerHTML += `
      <div class="card">✔ ${t.userName}</div>
    `;
  }

  addLog("Auto selesai","info");
}

// LOG
function addLog(msg,type){
  document.getElementById("logContainer").innerHTML += `
    <div class="log-item ${type}">• ${msg}</div>
  `;
}

// NAV
function goHome(){
  document.getElementById("homePage").style.display="block";
  document.getElementById("autoPage").style.display="none";
}

function goAuto(){
  document.getElementById("homePage").style.display="none";
  document.getElementById("autoPage").style.display="block";
}

// DRAWER
function openDrawer(){
  document.getElementById("drawer").classList.add("open");
}
function closeDrawer(){
  document.getElementById("drawer").classList.remove("open");
}

</script>

</body>
</html>
