<!DOCTYPE html>
<html>
<head>
  <title>Auto Feedback App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #05070f;
      color: white;
    }

    .screen {
      display: none;
      height: 100vh;
      overflow: auto;
    }

    .active {
      display: block;
    }

    .center {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      padding: 20px;
      padding-bottom: 90px;
    }

    input {
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      border-radius: 10px;
      border: none;
      background: #121826;
      color: white;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(90deg, red, darkred);
      color: white;
      font-weight: bold;
    }

    .header {
      text-align: center;
      font-size: 18px;
      margin-bottom: 10px;
    }

    .card {
      background: #121826;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .row {
      display: flex;
      align-items: center;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 8px;
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #0b1120;
      display: flex;
    }

    .bottom-nav button {
      flex: 1;
      background: none;
      color: white;
      border: none;
      padding: 10px;
      font-size: 12px;
    }

    /* LOADING */
    .loading {
      position: fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background: rgba(0,0,0,0.7);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:999;
    }

    .spinner {
      border: 4px solid #333;
      border-top: 4px solid red;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    /* 🔥 DRAWER LOG */
    .drawer {
      position: fixed;
      top: 0;
      right: -100%;
      width: 85%;
      height: 100%;
      background: #0b1120;
      box-shadow: -5px 0 20px rgba(0,0,0,0.7);
      transition: 0.4s;
      z-index: 1000;
      overflow: auto;
    }

    .drawer.open {
      right: 0;
    }

    .drawer-header {
      padding: 15px;
      font-weight: bold;
      border-bottom: 1px solid #222;
      display: flex;
      justify-content: space-between;
    }

    .log {
      padding: 10px;
      font-size: 12px;
    }

    .log-item {
      padding: 10px;
      border-bottom: 1px solid #111;
    }

    .success { color: #00ff9d; }
    .error { color: red; }
    .skip { color: orange; }
    .info { color: #4cc9f0; }

  </style>
</head>

<body>

<div id="loading" class="loading">
  <div class="spinner"></div>
</div>

<!-- 🔥 DRAWER -->
<div id="drawer" class="drawer">
  <div class="drawer-header">
    <span>LOG AUTO</span>
    <button onclick="closeDrawer()" style="background:none;border:none;color:white;">X</button>
  </div>
  <div id="logContainer" class="log"></div>
</div>

<!-- LOGIN -->
<div id="loginScreen" class="screen active center">
  <div style="width:100%; max-width:320px;">
    <div class="header">LOGIN</div>

    <input id="account" placeholder="No HP">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">MASUK</button>
  </div>
</div>

<!-- HOME -->
<div id="homeScreen" class="screen">
  <div class="container">
    <div class="header">DASHBOARD</div>

    <button onclick="loadTasks()">LOAD TASK</button>

    <div id="taskList"></div>
  </div>
</div>

<!-- AUTO -->
<div id="autoScreen" class="screen">
  <div class="container">
    <div class="header">AUTO FEEDBACK</div>

    <button onclick="startAuto()">START AUTO</button>

    <div id="successList"></div>
  </div>
</div>

<!-- NAV -->
<div class="bottom-nav">
  <button onclick="goHome()">🏠<br>Home</button>
  <button onclick="goAuto()">⚡<br>Auto</button>
  <button onclick="openDrawer()">📋<br>Log</button>
</div>

<script>

const BASE = "https://auto-feedback-backend-1.onrender.com";
let user = "";

// LOADING
function showLoading(s){
  document.getElementById("loading").style.display = s ? "flex" : "none";
}

// DRAWER
function openDrawer(){
  document.getElementById("drawer").classList.add("open");
}

function closeDrawer(){
  document.getElementById("drawer").classList.remove("open");
}

// LOG
function addLog(msg,type="info"){
  const el = document.getElementById("logContainer");

  el.innerHTML += `
    <div class="log-item ${type}">
      • ${msg}
    </div>
  `;

  el.scrollTop = el.scrollHeight;
}

// SCREEN
function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// LOGIN
async function login(){
  user = document.getElementById("account").value;

  showLoading(true);

  const res = await fetch(BASE + "/login",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      account:user,
      password:document.getElementById("password").value
    })
  });

  const data = await res.json();
  showLoading(false);

  if(data.success){
    showScreen("homeScreen");
    addLog("Login sukses","success");
  } else {
    addLog("Login gagal","error");
  }
}

// LOAD TASK
async function loadTasks(){
  showLoading(true);

  const res = await fetch(BASE + "/tasks/" + user);
  const data = await res.json();

  const list = document.getElementById("taskList");
  list.innerHTML = "";

  data.data.forEach(t=>{
    const hari = t.diffDays || 0;
    const color = (hari >= 10) ? "red" : "green";

    list.innerHTML += `
      <div class="card">
        <div class="row">
          <div class="dot" style="background:${color}"></div>
          <b>${t.userName}</b>
        </div>
        <div>${hari} hari sejak feedback</div>
      </div>
    `;
  });

  showLoading(false);
}

// AUTO
async function startAuto(){

  showScreen("autoScreen");

  showLoading(true);

  const res = await fetch(BASE + "/tasks/" + user);
  const data = await res.json();

  showLoading(false);

  let tasks = data.data || [];

  for(let t of tasks){

    if((t.diffDays || 0) < 10){
      addLog("Skip " + t.userName,"skip");
      continue;
    }

    try{
      await fetch(BASE + "/auto-feedback/" + user);
      addLog("Success " + t.userName,"success");

      document.getElementById("successList").innerHTML += `
        <div class="card">✔ ${t.userName}</div>
      `;

    }catch(e){
      addLog("Error " + t.userName,"error");
    }
  }

  addLog("Auto selesai","info");
}

// NAV
function goHome(){ showScreen("homeScreen"); }
function goAuto(){ showScreen("autoScreen"); }

</script>

</body>
</html>
