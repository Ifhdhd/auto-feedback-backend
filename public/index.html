<!DOCTYPE html>
<html>
<head>
  <title>Auto Feedback App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #05070f;
      color: white;
    }

    .screen {
      display: none;
      height: 100vh;
      overflow: auto;
    }

    .active {
      display: block;
    }

    .container {
      padding: 20px;
    }

    input {
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      border-radius: 10px;
      border: none;
      background: #121826;
      color: white;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(90deg, #ff0000, #8b0000);
      color: white;
      font-weight: bold;
    }

    .header {
      text-align: center;
      font-weight: bold;
      font-size: 18px;
      margin-bottom: 10px;
    }

    .card {
      background: #121826;
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 10px;
    }

    .row {
      display: flex;
      align-items: center;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 8px;
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #0b1120;
      display: flex;
    }

    .bottom-nav button {
      flex: 1;
      background: none;
      color: white;
      border: none;
      padding: 10px;
      font-size: 12px;
    }

    .loading {
      position: fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background: rgba(0,0,0,0.7);
      display:none;
      align-items:center;
      justify-content:center;
      font-size:18px;
    }

    .spinner {
      border: 4px solid #333;
      border-top: 4px solid red;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>

<body>

<!-- LOADING -->
<div class="loading" id="loading">
  <div class="spinner"></div>
</div>

<!-- LOGIN -->
<div id="loginScreen" class="screen active">
  <div class="container">
    <div class="header">LOGIN</div>

    <input id="account" placeholder="No HP">
    <input id="password" placeholder="Password" type="password">

    <button onclick="login()">MASUK</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboardScreen" class="screen">
  <div class="container">
    <div class="header">DASHBOARD</div>

    <button onclick="loadTasks()">LOAD TASK</button>

    <div id="taskList"></div>
  </div>

  <div class="bottom-nav">
    <button onclick="goHome()">🏠<br>Home</button>
    <button onclick="runAuto()">⚡<br>Auto</button>
    <button onclick="loadNotif()">🔔<br>Notif</button>
  </div>
</div>

<script>

const BASE = "https://auto-feedback-backend.onrender.com";
let user = "";

// UI CONTROL
function showLoading(state){
  document.getElementById("loading").style.display = state ? "flex" : "none";
}

function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// LOGIN
async function login(){
  user = document.getElementById("account").value;

  if(!user){
    alert("Isi nomor dulu");
    return;
  }

  showLoading(true);

  try {
    const res = await fetch(BASE + "/login", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({
        account:user,
        password:document.getElementById("password").value
      })
    });

    const data = await res.json();

    showLoading(false);

    if(data.success){
      alert("Login berhasil");
      showScreen("dashboardScreen");
    } else {
      alert("Login gagal");
    }

  } catch(e){
    showLoading(false);
    alert("Server error");
  }
}

// DOT COLOR
function getDotColor(diff){
  return diff >= 10 ? "red" : "green";
}

// LOAD TASK
async function loadTasks(){
  if(!user){
    alert("Login dulu");
    return;
  }

  showLoading(true);

  try {
    const res = await fetch(BASE + "/tasks/" + user);
    const data = await res.json();

    const list = document.getElementById("taskList");
    list.innerHTML = "";

    if(!data.success || !data.data){
      list.innerHTML = "Tidak ada data";
      showLoading(false);
      return;
    }

    data.data.forEach(t=>{
      const color = getDotColor(t.diffDays || 0);

      list.innerHTML += `
        <div class="card">
          <div class="row">
            <div class="dot" style="background:${color}"></div>
            <b>${t.userName}</b>
          </div>

          <div>Debt: ${t.formatDebt}</div>
          <div>DPD: ${t.dpd}</div>
          <div>${t.diffDays} hari sejak feedback</div>
        </div>
      `;
    });

    showLoading(false);

  } catch(e){
    showLoading(false);
    alert("Gagal load");
  }
}

// AUTO
async function runAuto(){
  if(!user){
    alert("Login dulu");
    return;
  }

  showLoading(true);

  try {
    await fetch(BASE + "/auto-feedback/" + user);
    showLoading(false);
    alert("Auto selesai");
  } catch(e){
    showLoading(false);
    alert("Auto gagal");
  }
}

// NOTIF
async function loadNotif(){
  if(!user){
    alert("Login dulu");
    return;
  }

  showLoading(true);

  try {
    const res = await fetch(BASE + "/notif/" + user);
    const data = await res.json();

    showLoading(false);

    if(!data.data || data.data.length === 0){
      alert("Tidak ada notif");
      return;
    }

    alert(data.data.join("\n"));

  } catch(e){
    showLoading(false);
    alert("Gagal notif");
  }
}

// NAV
function goHome(){
  loadTasks();
}

</script>

</body>
</html>
