<!DOCTYPE html>
<html lang="id">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CYBER SYSTEM v2.3</title>

<style>
:root {
  --primary: #ff0033;
  --accent: #00ffcc;
  --glass: rgba(15, 20, 40, 0.85);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  margin:0;
  font-family: 'Segoe UI', Arial, sans-serif;
  background:#02040a;
  color:#e0e0ff;
  min-height:100vh;
}

body::before {
  content:"";
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(rgba(255,0,51,0.07) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,204,0.05) 1px, transparent 1px);
  background-size:50px 50px;
  z-index:0;
}

.container { 
  padding:16px; 
  padding-bottom:90px; 
  position:relative; 
  z-index:2; 
}

/* Panel */
.panel {
  background: var(--glass);
  backdrop-filter: blur(14px);
  border: 1px solid rgba(255,0,51,0.3);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 16px;
  box-shadow: 0 4px 20px rgba(255,0,51,0.15);
}

.header {
  color: var(--primary);
  font-size: 1.45rem;
  font-weight: 800;
  letter-spacing: 2px;
  margin-bottom: 14px;
  text-shadow: 0 0 12px var(--primary);
}

/* Stats */
.stats {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  margin-bottom: 16px;
}
.stat {
  background: rgba(0,0,0,0.55);
  border: 1px solid rgba(255,0,51,0.25);
  border-radius: 12px;
  padding: 14px 10px;
  text-align: center;
}
.stat b { 
  font-size: 1.95rem; 
  color: var(--accent); 
  font-weight: 900;
}

/* Task Card - Clean Version */
.task-card {
  background: var(--glass);
  border: 1px solid rgba(255,0,51,0.3);
  border-radius: 16px;
  padding: 15px;
  margin-bottom: 12px;
}

.task-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}

.avatar {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: #222;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  border: 2px solid var(--accent);
}

.task-info h3 {
  font-size: 1.1rem;
}

.status {
  color: #00ff9c;
  font-size: 0.92rem;
  display: flex;
  align-items: center;
  gap: 6px;
}

.dot { 
  width: 9px; 
  height: 9px; 
  background: #00ff9c; 
  border-radius: 50%; 
}

.info-row {
  display: flex;
  justify-content: space-between;
  padding: 7px 0;
  font-size: 0.95rem;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.info-row:last-child { border-bottom: none; }

.tunggakan {
  font-size: 1.45rem;
  font-weight: bold;
  color: #ff3366;
  margin: 8px 0;
}

/* AUTO SCREEN */
.progress-container {
  margin: 20px 0;
  text-align: center;
}

.progress-bar {
  height: 14px;
  background: #111827;
  border-radius: 9999px;
  overflow: hidden;
  border: 1px solid rgba(0,255,204,0.3);
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #ff0033, #00ffcc);
  transition: width 0.6s ease;
}

#progressText {
  font-size: 1.3rem;
  font-weight: 600;
  margin-bottom: 8px;
  color: var(--accent);
}

/* Log */
.log {
  background: rgba(0,0,0,0.75);
  border: 1px solid rgba(255,0,51,0.25);
  border-radius: 12px;
  padding: 14px;
  height: 320px;
  overflow-y: auto;
  font-size: 14px;
}

.log-success { color: #00ff9c; }
.log-skip    { color: #ffcc00; }
.log-error   { color: #ff3366; }
.log-info    { color: #88aaff; }

/* Bottom Nav */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  display: flex;
  background: rgba(5,8,20,0.97);
  backdrop-filter: blur(12px);
  border-top: 1px solid rgba(255,0,51,0.3);
  z-index: 100;
}
.bottom-nav button {
  flex: 1;
  padding: 12px 0;
  background: none;
  border: none;
  color: #aaa;
  font-size: 1.6rem;
}
.bottom-nav button.active {
  color: var(--accent);
}

/* Loading */
.loading {
  position: fixed; inset: 0;
  background: rgba(2,4,10,0.95);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 999;
}
.spinner {
  width: 56px; height: 56px;
  border: 5px solid #222;
  border-top: 5px solid var(--accent);
  border-radius: 50%;
  animation: spin 1.1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="loading" class="loading"><div class="spinner"></div></div>

<!-- LOGIN -->
<div id="loginScreen" class="screen active">
  <div class="container" style="margin-top:80px; text-align:center;">
    <h1 style="font-size:2.6rem; color:#ff3366; text-shadow:0 0 25px #ff0033;">CYBER SYSTEM</h1>
    <p style="color:#777; margin:10px 0 40px;">v2.3 • AUTO FEEDBACK</p>
    
    <div class="panel">
      <div class="header">ACCESS CONTROL</div>
      <input id="account" placeholder="Account ID" style="margin:12px 0;">
      <input id="password" type="password" placeholder="Password">
      <button onclick="login()" style="margin-top:15px; padding:14px;">LOGIN TO SYSTEM</button>
    </div>
  </div>
</div>

<!-- HOME SCREEN -->
<div id="homeScreen" class="screen">
  <div class="container">
    <div class="panel">
      <div class="header">SYSTEM STATUS</div>
      <div class="stats">
        <div class="stat"><b id="total">0</b><br>Total</div>
        <div class="stat"><b id="ready">0</b><br>Ready</div>
        <div class="stat"><b id="skip">0</b><br>Skip</div>
        <div class="stat"><b id="done">0</b><br>Done</div>
      </div>
      <button onclick="loadTasks()">SYNC DATA TERBARU</button>
    </div>

    <div id="taskList"></div>
  </div>
</div>

<!-- AUTO SCREEN -->
<div id="autoScreen" class="screen">
  <div class="container">
    <div class="panel">
      <div class="header">AUTO FEEDBACK PROTOCOL</div>
      
      <button onclick="startAuto()" style="margin-bottom:10px; padding:16px; font-size:1.1rem;">
        🚀 START AUTO FEEDBACK
      </button>
      <button onclick="stopAuto()" style="background:linear-gradient(90deg,#555,#333); padding:14px;">
        ⛔ STOP AUTO PROCESS
      </button>

      <div class="progress-container">
        <div id="progressText">0 / 0</div>
        <div class="progress-bar">
          <div id="progressFill" class="progress-fill"></div>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="header">PROCESS LOG</div>
      <div id="log" class="log"></div>
    </div>
  </div>
</div>

<div class="bottom-nav">
  <button onclick="goHome()" class="active">🏠<br><small>Home</small></button>
  <button onclick="goAuto()">⚡<br><small>Auto</small></button>
</div>

<script>
const BASE = "https://auto-feedback-backend.onrender.com";
let user = "";
let stopFlag = false;

function showLoading(s) {
  document.getElementById("loading").style.display = s ? "flex" : "none";
}

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function log(msg, type = "info") {
  const el = document.getElementById("log");
  el.innerHTML += `<div class="log-${type}">• ${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

// LOGIN
async function login() {
  user = document.getElementById("account").value.trim();
  if (!user) return alert("Masukkan Account ID");

  showLoading(true);
  try {
    const res = await fetch(BASE + "/login", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ account: user, password: document.getElementById("password").value })
    });
    const data = await res.json();

    if (data.success) {
      showScreen("homeScreen");
      loadTasks();
    } else {
      alert("Login gagal");
    }
  } catch (e) {
    alert("Koneksi error");
  }
  showLoading(false);
}

// LOAD TASKS (Home Screen)
async function loadTasks() {
  showLoading(true);
  try {
    const res = await fetch(BASE + "/tasks/" + user);
    const result = await res.json();

    if (!result.success) throw new Error();

    const tasks = result.data || [];
    let total = tasks.length;
    let ready = 0, skip = 0;

    let html = "";
    tasks.forEach(t => {
      const isReady = t.diffDays >= 10;
      if (isReady) ready++; else skip++;

      html += `
        <div class="task-card">
          <div class="task-header">
            <div class="avatar">👤</div>
            <div class="task-info">
              <h3>${t.userName || 'Debitur'}</h3>
              <div class="status">
                <span class="dot"></span> Sedang Diproses [Akulaku]
              </div>
            </div>
          </div>

          <div class="info-row">
            <span>Hari Sejak Feedback Terakhir</span>
            <span style="color:\( {isReady ? '#00ff9c' : '#ffcc00'}"> \){t.diffDays || 0} hari</span>
          </div>

          <div class="tunggakan">
            Rp ${t.tunggakanAmount ? Number(t.tunggakanAmount).toLocaleString('id-ID') : '0'}
          </div>

          ${t.addressBo?.address ? `
          <div class="info-row" style="font-size:0.9rem; color:#aaa;">
            <span>Alamat</span>
            <span>${t.addressBo.address}</span>
          </div>` : ''}
        </div>
      `;
    });

    document.getElementById("taskList").innerHTML = html || 
      `<p style="text-align:center;color:#666;padding:40px 20px;">Tidak ada task saat ini</p>`;

    document.getElementById("total").innerText = total;
    document.getElementById("ready").innerText = ready;
    document.getElementById("skip").innerText = skip;

  } catch (e) {
    document.getElementById("taskList").innerHTML = `<p style="color:red;text-align:center;padding:30px;">Gagal memuat data</p>`;
  }
  showLoading(false);
}

// ==================== AUTO FEEDBACK ====================
async function startAuto() {
  stopFlag = false;
  log("Auto Feedback Protocol Activated", "info");

  try {
    const res = await fetch(BASE + "/tasks/" + user);
    const data = await res.json();
    const tasks = data.data || [];

    let total = tasks.length;
    let done = 0;

    document.getElementById("progressText").innerText = `0 / ${total}`;

    for (let t of tasks) {
      if (stopFlag) {
        log("Process dihentikan oleh pengguna", "error");
        break;
      }

      log(`Memproses: \( {t.userName} ( \){t.diffDays} hari)`, "info");

      if (t.diffDays < 10) {
        log("Task diskip - belum mencapai 10 hari", "skip");
        continue;
      }

      await fetch(BASE + "/auto-feedback/" + user);

      done++;
      const percent = Math.round((done / total) * 100);

      document.getElementById("progressText").innerText = `${done} / ${total}`;
      document.getElementById("progressFill").style.width = percent + "%";

      log(`✅ Feedback berhasil dikirim untuk ${t.userName}`, "success");

      await new Promise(r => setTimeout(r, 1200));
    }

    log("Auto Feedback Protocol selesai", "success");

  } catch (err) {
    log("Terjadi kesalahan saat menjalankan auto feedback", "error");
  }
}

function stopAuto() {
  stopFlag = true;
}

function goHome() {
  showScreen("homeScreen");
}

function goAuto() {
  showScreen("autoScreen");
}
</script>
</body>
</html>
