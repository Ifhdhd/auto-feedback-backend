<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cyber System</title>

<style>
body{
  margin:0;
  font-family:monospace;
  color:#fff;
  background:#02040a;
}

body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background-image:
    linear-gradient(rgba(255,0,0,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,0,0,0.05) 1px, transparent 1px);
  background-size:40px 40px;
}

.screen{display:none;height:100vh;overflow:auto;}
.active{display:block;}
.container{padding:15px;padding-bottom:100px;}

.panel{
  background:rgba(10,15,30,0.6);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,0,0,0.2);
  border-radius:12px;
  padding:12px;
  margin-bottom:10px;
}

.header{
  color:red;
  text-shadow:0 0 10px red;
  margin-bottom:10px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  margin-top:8px;
  background:linear-gradient(90deg, red, darkred);
  color:white;
  font-weight:bold;
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:1px solid #111;
  background:#0b1120;
  color:white;
}

.card{
  background:rgba(0,0,0,0.4);
  padding:10px;
  border-radius:10px;
  margin-bottom:8px;
}

.dot{
  width:8px;height:8px;border-radius:50%;
  display:inline-block;margin-right:5px;
}

.progress-bar{
  height:10px;
  background:#111;
  border-radius:10px;
  overflow:hidden;
  margin-top:8px;
}

.progress-fill{
  height:100%;
  width:0%;
  background:red;
}

/* LOG */
.log{
  background:black;
  color:#00ff9c;
  padding:10px;
  height:250px;
  overflow:auto;
  font-size:12px;
  border-radius:10px;
  border:1px solid #0f0;
}

/* NAV */
.bottom-nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:#05070f;
  display:flex;
}

.bottom-nav button{
  flex:1;
  background:none;
  color:#aaa;
}

</style>
</head>

<body>

<div id="loginScreen" class="screen active">
  <div class="container">
    <div class="panel">
      <div class="header">LOGIN</div>
      <input id="account" placeholder="Account">
      <input id="password" type="password" placeholder="Password">
      <button onclick="login()">LOGIN</button>
    </div>
  </div>
</div>

<div id="homeScreen" class="screen">
  <div class="container">
    <div class="panel">
      <div class="header">DATA</div>
      <button onclick="loadTasks()">LOAD TASK</button>
      <button onclick="startAuto()">AUTO FEEDBACK</button>
    </div>
    <div id="taskList"></div>
  </div>
</div>

<div id="autoScreen" class="screen">
  <div class="container">

    <div class="panel">
      <div class="header">AUTO</div>
      <button onclick="startAuto()">START</button>
      <button onclick="stopAuto()">STOP</button>

      <div id="progressText">0 / 0</div>
      <div class="progress-bar">
        <div id="progressFill" class="progress-fill"></div>
      </div>
    </div>

    <div class="panel">
      <div class="header">SYSTEM LOG</div>
      <div id="log" class="log"></div>
    </div>

  </div>
</div>

<div class="bottom-nav">
  <button onclick="goHome()">HOME</button>
  <button onclick="goAuto()">AUTO</button>
</div>

<script>

const BASE="https://auto-feedback-backend-1.onrender.com";
let user="";
let stopFlag=false;

function log(msg){
  let el=document.getElementById("log");
  el.innerHTML+="<div>> "+msg+"</div>";
  el.scrollTop=el.scrollHeight;
}

function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

async function login(){
  user=document.getElementById("account").value;

  let res=await fetch(BASE+"/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      account:user,
      password:document.getElementById("password").value
    })
  });

  let data=await res.json();

  if(data.success){
    showScreen("homeScreen");
  }else{
    alert("Login gagal");
  }
}

async function loadTasks(){
  let res=await fetch(BASE+"/tasks/"+user);
  let data=await res.json();

  let list=document.getElementById("taskList");
  list.innerHTML="";

  data.data.forEach(t=>{
    let color=(t.diffDays>=10)?"red":"lime";

    list.innerHTML+=`
      <div class="card">
        <span class="dot" style="background:${color}"></span>
        ${t.userName} - ${t.diffDays} hari
      </div>
    `;
  });
}

async function startAuto(){

  stopFlag=false;
  showScreen("autoScreen");

  log("Start auto feedback...");

  let res=await fetch(BASE+"/tasks/"+user);
  let data=await res.json();

  let tasks=data.data||[];
  let total=tasks.length;
  let done=0;

  for(let t of tasks){

    if(stopFlag){
      log("STOPPED");
      break;
    }

    log("Checking "+t.userName+" ("+t.diffDays+" hari)");

    if(t.diffDays<10){
      log("Skip");
      continue;
    }

    await fetch(BASE+"/auto-feedback/"+user);

    done++;

    let percent=(done/total)*100;

    document.getElementById("progressText").innerText=done+" / "+total;
    document.getElementById("progressFill").style.width=percent+"%";

    log("✔ Success");

    await new Promise(r=>setTimeout(r,1000));
  }

  log("DONE");
}

function stopAuto(){
  stopFlag=true;
}

function goHome(){showScreen("homeScreen");}
function goAuto(){showScreen("autoScreen");}

</script>

</body>
</html>
