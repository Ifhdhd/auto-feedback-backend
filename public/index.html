<!DOCTYPE html>
<html>
<head>

  <title>Auto Feedback App</title>

  <meta name="viewport"
        content="width=device-width, initial-scale=1">

  <style>

    body{
      margin:0;
      font-family:Arial;
      background:#05070f;
      color:white;
    }

    .screen{
      display:none;
      height:100vh;
      overflow:auto;
    }

    .active{
      display:block;
    }

    .container{
      padding:20px;
      padding-bottom:90px;
    }

    input,select{
      width:100%;
      padding:14px;
      margin:8px 0;
      border-radius:10px;
      border:none;
      background:#121826;
      color:white;
      box-sizing:border-box;
    }

    button{
      width:100%;
      padding:14px;
      margin-top:10px;
      border-radius:10px;
      border:none;
      background:linear-gradient(90deg,red,darkred);
      color:white;
      font-weight:bold;
    }

    .header{
      text-align:center;
      font-size:20px;
      margin-bottom:15px;
      font-weight:bold;
    }

    .card{
      background:#121826;
      padding:12px;
      border-radius:12px;
      margin-bottom:12px;
      box-shadow:0 0 10px rgba(0,0,0,.3);
    }

    .row{
      display:flex;
      align-items:center;
    }

    .dot{
      width:10px;
      height:10px;
      border-radius:50%;
      margin-right:8px;
    }

    .bottom-nav{
      position:fixed;
      bottom:0;
      width:100%;
      background:#0b1120;
      display:flex;
      border-top:1px solid #1e293b;
    }

    .bottom-nav button{
      flex:1;
      background:none;
      color:white;
      border:none;
      padding:10px;
      font-size:12px;
    }

    .loading{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.7);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:999;
    }

    .spinner{
      border:4px solid #333;
      border-top:4px solid red;
      border-radius:50%;
      width:40px;
      height:40px;
      animation:spin 1s linear infinite;
    }

    @keyframes spin{
      100%{
        transform:rotate(360deg);
      }
    }

    .toast{
      position:fixed;
      bottom:90px;
      left:50%;
      transform:translateX(-50%);
      background:#1e293b;
      padding:12px 20px;
      border-radius:8px;
      display:none;
      z-index:999;
      font-size:14px;
    }

    .date{
      color:#9ca3af;
      font-size:13px;
      margin-top:5px;
    }

    #logBox{
      background:#05070f;
      border-radius:10px;
      padding:10px;
      height:300px;
      overflow:auto;
      font-size:13px;
      margin-top:10px;
      border:1px solid #1e293b;
    }

    .log-item{
      margin-bottom:8px;
      border-bottom:1px solid #1e293b;
      padding-bottom:5px;
      color:#e2e8f0;
    }

  </style>

</head>

<body>

<div id="loading" class="loading">
  <div class="spinner"></div>
</div>

<div id="toast" class="toast"></div>

<!-- LOGIN -->
<div id="loginScreen"
     class="screen active">

  <div class="container">

    <div class="header">
      LOGIN
    </div>

    <input id="account"
           placeholder="No HP">

    <input id="password"
           type="password"
           placeholder="Password">

    <select id="appVersion">

      <option value="0">
        NON ZIZHANGYI
      </option>

      <option value="1">
        ZIZHANGYI
      </option>

    </select>

    <button onclick="login()">
      MASUK
    </button>

  </div>

</div>

<!-- HOME -->
<div id="homeScreen"
     class="screen">

  <div class="container">

    <div class="header">
      DASHBOARD
    </div>

    <button onclick="loadTasks()">
      LOAD TASK
    </button>

    <div id="taskList"></div>

  </div>

</div>

<!-- AUTO -->
<div id="autoScreen"
     class="screen">

  <div class="container">

    <div class="header">
      AUTO FEEDBACK
    </div>

    <button onclick="startAuto()">
      START AUTO FEEDBACK
    </button>

    <!-- PROGRESS -->
    <div class="card">

      <div id="progressText">
        0 / 0
      </div>

      <div style="
        height:10px;
        background:#222;
        border-radius:10px;
        overflow:hidden;
        margin-top:10px;
      ">

        <div id="progressFill"
             style="
               height:100%;
               width:0%;
               background:red;
               transition:.3s;
             ">
        </div>

      </div>

    </div>

    <!-- LOG -->
    <div class="card">

      <div style="
        font-weight:bold;
        margin-bottom:10px;
      ">
        LOG AUTO FEEDBACK
      </div>

      <div id="logBox">

        <div style="color:#9ca3af">
          Belum ada log...
        </div>

      </div>

    </div>

    <!-- SUCCESS -->
    <div id="successList"></div>

  </div>

</div>

<!-- NAV -->
<div class="bottom-nav">

  <button onclick="goHome()">
    🏠<br>Home
  </button>

  <button onclick="goAuto()">
    ⚡<br>Auto
  </button>

</div>

<script>

let user = "";

//
// LOADING
//
function showLoading(s){

  document
    .getElementById("loading")
    .style.display =
      s ? "flex" : "none";

}

//
// TOAST
//
function toast(msg){

  const t =
    document.getElementById("toast");

  t.innerText = msg;

  t.style.display = "block";

  setTimeout(()=>{

    t.style.display = "none";

  },2500);

}

//
// SCREEN
//
function showScreen(id){

  document
    .querySelectorAll(".screen")
    .forEach(s=>s.classList.remove("active"));

  document
    .getElementById(id)
    .classList.add("active");

}

//
// LOGIN
//
async function login(){

  user =
    document.getElementById("account").value;

  const password =
    document.getElementById("password").value;

  const appVersion =
    document.getElementById("appVersion").value;

  showLoading(true);

  try{

    const res =
      await fetch("/login",{

        method:"POST",

        headers:{
          "Content-Type":"application/json"
        },

        body:JSON.stringify({

          account:user,
          password,
          appVersion

        })

      });

    const data =
      await res.json();

    showLoading(false);

    if(data.success){

      toast("Login berhasil");

      showScreen("homeScreen");

    }else{

      toast(
        data.error || "Login gagal"
      );

    }

  }catch(err){

    showLoading(false);

    toast("Koneksi error");

  }

}

//
// LOAD TASK
//
async function loadTasks(){

  showLoading(true);

  try{

    const res =
      await fetch("/tasks/" + user);

    const data =
      await res.json();

    const list =
      document.getElementById("taskList");

    list.innerHTML = "";

    if(!data.success){

      toast(
        data.error || "Gagal load task"
      );

      showLoading(false);

      return;
    }

    if(!data.data.length){

      list.innerHTML = `
        <div class="card">
          Tidak ada data
        </div>
      `;

      showLoading(false);

      return;
    }

    data.data.forEach(t=>{

      const diff =
        Number(t.diffDays || 0);

      let color = "green";

      if(diff >= 10){
        color = "red";
      }

      let statusText =
        "Belum waktunya feedback";

      if(diff >= 10){
        statusText =
          "Siap feedback";
      }

      const lastFeedback =
        t.lastFeedbackText ||
        "Belum pernah";

      list.innerHTML += `

        <div class="card">

          <div class="row"
               style="
                 margin-top:10px;
                 display:flex;
                 align-items:center;
                 gap:10px;
               ">

            <div class="dot"
                 style="
                   width:12px;
                   height:12px;
                   border-radius:50%;
                   background:${color};
                 ">
            </div>

            <b style="font-size:16px">
              ${t.userName || "-"}
            </b>

          </div>

          <div style="
            margin-top:8px;
            opacity:.8;
          ">
            ${t.phoneNumber || "-"}
          </div>

          <div style="
            margin-top:10px;
            font-weight:bold;
            color:${color};
          ">
            ${diff} hari sejak feedback terakhir
          </div>

          <div class="date">

            Feedback terakhir:
            <br>

            <b>
              ${lastFeedback}
            </b>

          </div>

          <div style="
            margin-top:12px;
            padding:8px;
            border-radius:8px;
            background:${color};
            color:white;
            text-align:center;
            font-weight:bold;
          ">
            ${statusText}
          </div>

        </div>

      `;

    });

  }catch(err){

    console.log(err);

    toast("Load task gagal");

  }

  showLoading(false);

}

//
// ADD LOG
//
function addLog(text){

  const box =
    document.getElementById("logBox");

  const jam =
    new Date().toLocaleTimeString(
      "id-ID",
      {
        hour:"2-digit",
        minute:"2-digit"
      }
    );

  box.innerHTML += `

    <div class="log-item">

      [${jam}] ${text}

    </div>

  `;

  box.scrollTop =
    box.scrollHeight;

}

//
// AUTO FEEDBACK
//
async function startAuto(){

  showScreen("autoScreen");

  try{

    const logBox =
      document.getElementById("logBox");

    logBox.innerHTML = "";

    addLog("🚀 Memulai auto feedback...");

    addLog("📥 Mengambil data task...");

    const res =
      await fetch("/tasks/" + user);

    const data =
      await res.json();

    if(!data.success){

      addLog("❌ Gagal load task");

      toast(
        data.error || "Gagal load task"
      );

      return;
    }

    let tasks =
      data.data || [];

    let total =
      tasks.length;

    let done = 0;

    addLog(
      "✅ Total task ditemukan: " + total
    );

    document
      .getElementById("successList")
      .innerHTML = "";

    for(let t of tasks){

      const diff =
        Number(t.diffDays || 0);

      addLog(
        "🔍 Mengecek " +
        t.userName +
        " (" +
        diff +
        " hari)"
      );

      // skip
      if(diff < 10){

        addLog(
          "⏩ Skip " +
          t.userName +
          " karena belum 10 hari"
        );

        continue;
      }

      try{

        addLog(
          "📤 Mengirim feedback ke " +
          t.userName
        );

        const send =
          await fetch(
            "/auto-feedback/" + user
          );

        const result =
          await send.json();

        if(!result.success){

          addLog(
            "❌ Gagal kirim feedback ke " +
            t.userName
          );

          continue;
        }

        done++;

        let percent =
          (done / total) * 100;

        document
          .getElementById("progressText")
          .innerText =
            done + " / " + total;

        document
          .getElementById("progressFill")
          .style.width =
            percent + "%";

        document
          .getElementById("successList")
          .innerHTML += `

            <div class="card">
              ✔ ${t.userName}
            </div>

          `;

        addLog(
          "✅ SUCCESS " +
          t.userName
        );

      }catch(err){

        addLog(
          "❌ ERROR " +
          t.userName
        );

      }

    }

    addLog(
      "🎉 Auto feedback selesai"
    );

    toast("Auto selesai");

  }catch(err){

    addLog(
      "❌ Auto feedback gagal"
    );

    toast("Auto feedback gagal");

  }

}

//
// NAVIGATION
//
function goHome(){
  showScreen("homeScreen");
}

function goAuto(){
  showScreen("autoScreen");
}

</script>

</body>
</html>
