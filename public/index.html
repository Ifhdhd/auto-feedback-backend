<!DOCTYPE html>
<html>
<head>
  <title>Auto Feedback App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #05070f;
      color: white;
    }

    .screen {
      display: none;
      height: 100vh;
      overflow: auto;
    }

    .active {
      display: block;
    }

    .container {
      padding: 20px;
      padding-bottom: 80px;
    }

    input {
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      border-radius: 10px;
      border: none;
      background: #121826;
      color: white;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(90deg, #ff0000, #8b0000);
      color: white;
      font-weight: bold;
    }

    .header {
      text-align: center;
      font-weight: bold;
      font-size: 18px;
      margin-bottom: 10px;
    }

    .card {
      background: #121826;
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 10px;
    }

    .row {
      display: flex;
      align-items: center;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 8px;
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #0b1120;
      display: flex;
    }

    .bottom-nav button {
      flex: 1;
      background: none;
      color: white;
      border: none;
      padding: 10px;
      font-size: 12px;
    }

    /* LOADING */
    .loading {
      position: fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background: rgba(0,0,0,0.7);
      display:none;
      align-items:center;
      justify-content:center;
    }

    .spinner {
      border: 4px solid #333;
      border-top: 4px solid red;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e293b;
      padding: 12px 20px;
      border-radius: 8px;
      display: none;
    }

    /* NOTIF PANEL */
    .notif-panel {
      position: fixed;
      top: 0;
      right: -100%;
      width: 80%;
      height: 100%;
      background: #0b1120;
      transition: 0.3s;
      padding: 15px;
      overflow: auto;
    }

    .notif-panel.active {
      right: 0;
    }

    .notif-item {
      padding: 10px;
      border-bottom: 1px solid #222;
      font-size: 13px;
    }
  </style>
</head>

<body>

<div id="loading" class="loading">
  <div class="spinner"></div>
</div>

<div id="toast" class="toast"></div>

<div id="notifPanel" class="notif-panel">
  <h3>NOTIFIKASI</h3>
  <div id="notifList"></div>
</div>

<!-- LOGIN -->
<div id="loginScreen" class="screen active">
  <div class="container">
    <div class="header">LOGIN</div>

    <input id="account" placeholder="No HP">
    <input id="password" placeholder="Password" type="password">

    <button onclick="login()">MASUK</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboardScreen" class="screen">
  <div class="container">
    <div class="header">DASHBOARD</div>

    <button onclick="loadTasks()">LOAD DATA</button>

    <div id="taskList"></div>
  </div>

  <div class="bottom-nav">
    <button onclick="goHome()">🏠<br>Home</button>
    <button onclick="runAuto()">⚡<br>Auto</button>
    <button onclick="toggleNotif()">🔔<br>Notif</button>
  </div>
</div>

<script>

const BASE = "https://auto-feedback-backend.onrender.com";
let user = "";

// UI
function showLoading(s){
  document.getElementById("loading").style.display = s ? "flex" : "none";
}

function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function toast(msg){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.style.display = "block";
  setTimeout(()=> t.style.display="none", 2000);
}

function toggleNotif(){
  const panel = document.getElementById("notifPanel");
  panel.classList.toggle("active");
  loadNotif();
}

// LOGIN
async function login(){
  user = document.getElementById("account").value;

  showLoading(true);

  try {
    const res = await fetch(BASE + "/login", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({
        account:user,
        password:document.getElementById("password").value
      })
    });

    const data = await res.json();
    showLoading(false);

    if(data.success){
      toast("Login berhasil");
      showScreen("dashboardScreen");
    } else {
      toast("Login gagal");
    }

  } catch {
    showLoading(false);
    toast("Server error");
  }
}

// DOT
function getDotColor(d){
  return d >= 10 ? "red" : "green";
}

// LOAD TASK
async function loadTasks(){
  showLoading(true);

  const res = await fetch(BASE + "/tasks/" + user);
  const data = await res.json();

  const list = document.getElementById("taskList");
  list.innerHTML = "";

  data.data.forEach(t=>{
    const color = getDotColor(t.diffDays || 0);

    list.innerHTML += `
      <div class="card">
        <div class="row">
          <div class="dot" style="background:${color}"></div>
          <b>${t.userName}</b>
        </div>
        <div>Debt: ${t.formatDebt}</div>
        <div>${t.diffDays} hari</div>
      </div>
    `;
  });

  showLoading(false);
}

// AUTO
async function runAuto(){
  showLoading(true);
  await fetch(BASE + "/auto-feedback/" + user);
  showLoading(false);
  toast("Auto feedback selesai");
}

// NOTIF
async function loadNotif(){
  const res = await fetch(BASE + "/notif/" + user);
  const data = await res.json();

  const list = document.getElementById("notifList");
  list.innerHTML = "";

  data.data.forEach(n=>{
    list.innerHTML += `<div class="notif-item">${n}</div>`;
  });
}

// NAV
function goHome(){
  loadTasks();
}

</script>

</body>
</html>
