<!DOCTYPE html>
<html>
<head>
  <title>Auto Feedback App</title>

  <meta name="viewport"
        content="width=device-width, initial-scale=1">

  <style>

    body{
      margin:0;
      font-family:Arial;
      background:#05070f;
      color:white;
    }

    .screen{
      display:none;
      height:100vh;
      overflow:auto;
    }

    .active{
      display:block;
    }

    .container{
      padding:20px;
      padding-bottom:90px;
    }

    input,select{
      width:100%;
      padding:14px;
      margin:8px 0;
      border-radius:10px;
      border:none;
      background:#121826;
      color:white;
      box-sizing:border-box;
    }

    button{
      width:100%;
      padding:14px;
      margin-top:10px;
      border-radius:10px;
      border:none;
      background:linear-gradient(90deg,red,darkred);
      color:white;
      font-weight:bold;
    }

    .header{
      text-align:center;
      font-size:18px;
      margin-bottom:10px;
    }

    .card{
      background:#121826;
      padding:12px;
      border-radius:10px;
      margin-bottom:10px;
    }

    .row{
      display:flex;
      align-items:center;
    }

    .dot{
      width:10px;
      height:10px;
      border-radius:50%;
      margin-right:8px;
    }

    .bottom-nav{
      position:fixed;
      bottom:0;
      width:100%;
      background:#0b1120;
      display:flex;
    }

    .bottom-nav button{
      flex:1;
      background:none;
      color:white;
      border:none;
      padding:10px;
      font-size:12px;
    }

    .loading{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.7);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:999;
    }

    .spinner{
      border:4px solid #333;
      border-top:4px solid red;
      border-radius:50%;
      width:40px;
      height:40px;
      animation:spin 1s linear infinite;
    }

    @keyframes spin{
      100%{
        transform:rotate(360deg);
      }
    }

    .toast{
      position:fixed;
      bottom:90px;
      left:50%;
      transform:translateX(-50%);
      background:#1e293b;
      padding:12px 20px;
      border-radius:8px;
      display:none;
      z-index:999;
    }

    .date{
      color:#9ca3af;
      font-size:13px;
      margin-top:5px;
    }

  </style>

</head>

<body>

<div id="loading" class="loading">
  <div class="spinner"></div>
</div>

<div id="toast" class="toast"></div>

<!-- LOGIN -->
<div id="loginScreen"
     class="screen active">

  <div class="container">

    <div class="header">
      LOGIN
    </div>

    <input id="account"
           placeholder="No HP">

    <input id="password"
           type="password"
           placeholder="Password">

    <select id="appVersion">

      <option value="0">
        NON ZIZHANGYI
      </option>

      <option value="1">
        ZIZHANGYI
      </option>

    </select>

    <button onclick="login()">
      MASUK
    </button>

  </div>

</div>

<!-- HOME -->
<div id="homeScreen"
     class="screen">

  <div class="container">

    <div class="header">
      DASHBOARD
    </div>

    <button onclick="loadTasks()">
      LOAD TASK
    </button>

    <div id="taskList"></div>

  </div>

</div>

<!-- AUTO -->
<div id="autoScreen"
     class="screen">

  <div class="container">

    <div class="header">
      AUTO FEEDBACK
    </div>

    <button onclick="startAuto()">
      START AUTO FEEDBACK
    </button>

    <div class="card">

      <div id="progressText">
        0 / 0
      </div>

      <div style="
        height:10px;
        background:#222;
        border-radius:10px;
        overflow:hidden;
        margin-top:10px;
      ">

        <div id="progressFill"
             style="
               height:100%;
               width:0%;
               background:red;
             "></div>

      </div>

    </div>

    <div id="successList"></div>

  </div>

</div>

<!-- NAV -->
<div class="bottom-nav">

  <button onclick="goHome()">
    🏠<br>Home
  </button>

  <button onclick="goAuto()">
    ⚡<br>Auto
  </button>

</div>

<script>

const BASE = "";

let user = "";

function showLoading(s){

  document
    .getElementById("loading")
    .style.display =
      s ? "flex" : "none";

}

function toast(msg){

  const t =
    document.getElementById("toast");

  t.innerText = msg;

  t.style.display = "block";

  setTimeout(()=>{

    t.style.display = "none";

  },2000);

}

function showScreen(id){

  document
    .querySelectorAll(".screen")
    .forEach(s=>s.classList.remove("active"));

  document
    .getElementById(id)
    .classList.add("active");

}

//
// LOGIN
//
async function login(){

  user =
    document.getElementById("account").value;

  const password =
    document.getElementById("password").value;

  const appVersion =
    document.getElementById("appVersion").value;

  showLoading(true);

  try{

    const res =
      await fetch("/login",{

        method:"POST",

        headers:{
          "Content-Type":"application/json"
        },

        body:JSON.stringify({

          account:user,
          password,
          appVersion

        })

      });

    const data =
      await res.json();

    showLoading(false);

    if(data.success){

      toast("Login berhasil");

      showScreen("homeScreen");

    }else{

      toast(
        data.error || "Login gagal"
      );

    }

  }catch(err){

    showLoading(false);

    toast("Koneksi error");

  }

}

//
// LOAD TASK
//
async function loadTasks(){

  showLoading(true);

  try{

    const res =
      await fetch("/tasks/" + user);

    const data =
      await res.json();

    const list =
      document.getElementById("taskList");

    list.innerHTML = "";

    if(!data.success){

      toast(
        data.error || "Gagal load task"
      );

      showLoading(false);

      return;
    }

    data.data.forEach(t=>{

      const diff =
        Number(t.diffDays || 0);

      const color =
        diff >= 10
        ? "red"
        : "green";

      list.innerHTML += `

        <div class="card">

          <div class="row">

            <div class="dot"
                 style="background:${color}">
            </div>

            <b>${t.userName || "-"}</b>

          </div>

          <div>
            ${diff} hari sejak feedback terakhir
          </div>

          <div class="date">
            Feedback terakhir:
            ${t.lastFeedbackDate || "-"}
          </div>

        </div>

      `;

    });

  }catch(err){

    toast("Load task gagal");

  }

  showLoading(false);

}

//
// AUTO FEEDBACK
//
async function startAuto(){

  showScreen("autoScreen");

  showLoading(true);

  try{

    const res =
      await fetch("/tasks/" + user);

    const data =
      await res.json();

    showLoading(false);

    let tasks =
      data.data || [];

    let total =
      tasks.length;

    let done = 0;

    document
      .getElementById("successList")
      .innerHTML = "";

    for(let t of tasks){

      if(
        Number(t.diffDays || 0) < 10
      ){
        continue;
      }

      await fetch(
        "/auto-feedback/" + user
      );

      done++;

      let percent =
        (done / total) * 100;

      document
        .getElementById("progressText")
        .innerText =
          done + " / " + total;

      document
        .getElementById("progressFill")
        .style.width =
          percent + "%";

      document
        .getElementById("successList")
        .innerHTML += `

          <div class="card">
            ✔ ${t.userName}
          </div>

        `;
    }

    toast("Auto selesai");

  }catch(err){

    showLoading(false);

    toast("Auto feedback gagal");

  }

}

function goHome(){
  showScreen("homeScreen");
}

function goAuto(){
  showScreen("autoScreen");
}

</script>

</body>
</html>
