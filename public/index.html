<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cyber System</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#02040a;
  color:white;
}

/* GRID */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background-image:
    linear-gradient(rgba(255,0,0,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,0,0,0.05) 1px, transparent 1px);
  background-size:40px 40px;
}

/* SCREEN */
.screen{display:none;height:100vh;}
.active{display:flex;}
.center{
  align-items:center;
  justify-content:center;
}

/* CONTAINER */
.container{
  width:100%;
  max-width:420px;
  padding:15px;
}

/* PANEL */
.panel{
  background:rgba(10,15,30,0.6);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,0,0,0.2);
  border-radius:15px;
  padding:20px;
  box-shadow:0 0 20px rgba(255,0,0,0.2);
}

/* HEADER */
.header{
  color:red;
  text-align:center;
  font-size:18px;
  margin-bottom:15px;
  text-shadow:0 0 10px red;
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:1px solid #111;
  background:#0b1120;
  color:white;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  margin-top:10px;
  background:linear-gradient(90deg, red, darkred);
  color:white;
  font-weight:bold;
}

/* HOME */
.scroll{
  height:100vh;
  overflow:auto;
  padding:15px;
  padding-bottom:90px;
}

/* CARD */
.card{
  display:flex;
  gap:10px;
  background:rgba(0,0,0,0.5);
  padding:10px;
  border-radius:12px;
  margin-bottom:10px;
  border:1px solid rgba(255,0,0,0.2);
}

/* FOTO */
.avatar{
  width:50px;
  height:50px;
  border-radius:50%;
  background:#111;
  object-fit:cover;
  border:1px solid red;
}

/* INFO */
.info{
  flex:1;
  font-size:13px;
}

.name{
  font-weight:bold;
  color:white;
}

.small{
  color:#aaa;
  font-size:12px;
}

/* DOT */
.dot{
  width:8px;height:8px;border-radius:50%;
  display:inline-block;
  margin-right:5px;
}

/* NAV */
.bottom-nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#05070f;
}

.bottom-nav button{
  flex:1;
  background:none;
  color:#aaa;
}

/* LOG */
.log{
  background:#000;
  padding:10px;
  border-radius:10px;
  height:200px;
  overflow:auto;
  font-size:12px;
}

.log-success{color:#00ff9c;}
.log-skip{color:orange;}
.log-error{color:red;}
.log-info{color:#aaa;}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="screen active center">
  <div class="container">
    <div class="panel">
      <div class="header">SYSTEM ACCESS</div>
      <input id="account" placeholder="Account">
      <input id="password" type="password" placeholder="Password">
      <button onclick="login()">LOGIN</button>
    </div>
  </div>
</div>

<!-- HOME -->
<div id="homeScreen" class="screen">
  <div class="scroll">

    <div class="panel">
      <div class="header">DATA</div>
      <button onclick="loadTasks()">SYNC DATA</button>
    </div>

    <div id="taskList"></div>

  </div>
</div>

<!-- AUTO -->
<div id="autoScreen" class="screen">
  <div class="scroll">

    <div class="panel">
      <div class="header">AUTO</div>
      <button onclick="startAuto()">START</button>
      <button onclick="stopAuto()">STOP</button>
    </div>

    <div class="panel">
      <div class="header">LOG</div>
      <div id="log" class="log"></div>
    </div>

  </div>
</div>

<div class="bottom-nav">
  <button onclick="goHome()">🏠<br>Home</button>
  <button onclick="goAuto()">⚡<br>Auto</button>
</div>

<script>

const BASE="https://auto-feedback-backend.onrender.com";
let user="";
let stopFlag=false;

function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function log(msg,type="info"){
  let el=document.getElementById("log");
  el.innerHTML+=`<div class="log-${type}">• ${msg}</div>`;
  el.scrollTop=el.scrollHeight;
}

// LOGIN
async function login(){
  user=document.getElementById("account").value;

  let res=await fetch(BASE+"/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      account:user,
      password:document.getElementById("password").value
    })
  });

  let data=await res.json();

  if(data.success){
    showScreen("homeScreen");
  }else{
    alert("Login gagal");
  }
}

// LOAD TASK
async function loadTasks(){

  let res=await fetch(BASE+"/tasks/"+user);
  let data=await res.json();

  let list=document.getElementById("taskList");
  list.innerHTML="";

  data.data.forEach(t=>{

    let color=(t.diffDays>=10)?"red":"lime";

    let photo = t.photo || "https://i.pravatar.cc/100";

    list.innerHTML+=`
      <div class="card">
        <img src="${photo}" class="avatar">
        <div class="info">
          <div class="name">
            <span class="dot" style="background:${color}"></span>
            ${t.userName || "-"}
          </div>
          <div class="small">📞 ${t.phone || "-"}</div>
          <div class="small">💰 ${t.formatDebt || "-"}</div>
          <div class="small">📅 ${t.diffDays} hari</div>
        </div>
      </div>
    `;
  });
}

// AUTO
async function startAuto(){

  stopFlag=false;
  showScreen("autoScreen");

  log("Start auto","info");

  let res=await fetch(BASE+"/tasks/"+user);
  let data=await res.json();

  let tasks=data.data||[];

  for(let t of tasks){

    if(stopFlag){
      log("Stopped","error");
      break;
    }

    if(t.diffDays<10){
      log("Skip "+t.userName,"skip");
      continue;
    }

    await fetch(BASE+"/auto-feedback/"+user);

    log("Success "+t.userName,"success");

    await new Promise(r=>setTimeout(r,1000));
  }

  log("Done","success");
}

function stopAuto(){
  stopFlag=true;
}

function goHome(){showScreen("homeScreen");}
function goAuto(){showScreen("autoScreen");}

</script>

</body>
</html>
