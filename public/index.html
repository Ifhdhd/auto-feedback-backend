<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cyber System</title>

<style>
body{
  margin:0;
  font-family:Arial;
  color:#fff;
  background:#02040a;
}

body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background-image:
    linear-gradient(rgba(255,0,0,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,0,0,0.05) 1px, transparent 1px);
  background-size:40px 40px;
  pointer-events:none;
}

.screen{display:none;height:100vh;overflow:auto;}
.active{display:block;}
.container{padding:15px;padding-bottom:100px;}

.panel{
  background:rgba(10,15,30,0.6);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,0,0,0.2);
  border-radius:12px;
  padding:16px;
  margin-bottom:12px;
  box-shadow:0 0 15px rgba(255,0,0,0.2);
}

.header{
  color:red;
  text-shadow:0 0 10px red;
  margin-bottom:12px;
  font-size:18px;
  font-weight:bold;
  border-bottom:1px solid rgba(255,0,0,0.2);
  padding-bottom:8px;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  margin-top:8px;
  background:linear-gradient(90deg, red, darkred);
  color:white;
  font-weight:bold;
  box-shadow:0 0 10px red;
}

.btn-stop{
  background:#111;
  box-shadow:0 0 5px #333;
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:1px solid #111;
  background:#0b1120;
  color:white;
}

.stats{
  display:flex;
  gap:10px;
}

.stat{
  flex:1;
  text-align:center;
  background:rgba(0,0,0,0.4);
  padding:12px 8px;
  border-radius:10px;
  border:1px solid rgba(255,0,0,0.2);
}

.stat b{
  font-size:20px;
  color:red;
}

/* Task Card */
.task-card{
  background:rgba(0,0,0,0.45);
  padding:14px;
  border-radius:12px;
  margin-bottom:12px;
  border:1px solid rgba(255,0,0,0.25);
}

.task-header{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:10px;
}

.avatar{
  width:48px; height:48px;
  background:#222;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  border:2px solid #00ff9c;
}

.info-row{
  display:flex;
  justify-content:space-between;
  margin:6px 0;
  font-size:14px;
}

.tunggakan{
  font-size:18px;
  font-weight:bold;
  color:#ff3366;
  margin:8px 0;
}

/* Auto Screen */
.progress-bar{
  height:12px;
  background:#111;
  border-radius:10px;
  overflow:hidden;
  margin:12px 0;
  position:relative;
}

.progress-fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg, red, #00ff9c);
}

.log{
  background:rgba(0,0,0,0.7);
  border-radius:10px;
  padding:12px;
  height:280px;
  overflow:auto;
  font-size:13.5px;
  margin-top:10px;
}

.log-success{color:#00ff9c;}
.log-skip{color:orange;}
.log-error{color:red;}
.log-info{color:#aaa;}

.bottom-nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:#05070f;
  display:flex;
  border-top:1px solid #111;
}

.bottom-nav button{
  flex:1;
  background:none;
  color:#aaa;
  font-size:12px;
  padding:10px 0;
}

/* Loading */
.loading{
  position:fixed;
  width:100%;height:100%;
  background:rgba(0,0,0,0.85);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.spinner{
  width:50px;height:50px;
  border:5px solid #222;
  border-top:5px solid red;
  border-right:5px solid #ff6600;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{100%{transform:rotate(360deg);}}

.toast{
  position:fixed;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
  background:#0b1120;
  padding:10px 15px;
  border-radius:8px;
  border:1px solid red;
  display:none;
  z-index:1000;
}
</style>
</head>

<body>

<div id="loading" class="loading"><div class="spinner"></div></div>
<div id="toast" class="toast"></div>

<!-- LOGIN -->
<div id="loginScreen" class="screen active">
  <div class="container">
    <div class="panel">
      <div class="header">SYSTEM LOGIN</div>
      <input id="account" placeholder="Account">
      <input id="password" type="password" placeholder="Password">
      <button onclick="login()">ACCESS</button>
    </div>
  </div>
</div>

<!-- HOME SCREEN -->
<div id="homeScreen" class="screen">
  <div class="container">
    <div class="panel">
      <div class="header">SYSTEM STATUS</div>
      <div class="stats">
        <div class="stat"><b id="total">0</b><br>Total</div>
        <div class="stat"><b id="ready">0</b><br>Ready</div>
        <div class="stat"><b id="skip">0</b><br>Skip</div>
        <div class="stat"><b id="done">0</b><br>Done</div>
      </div>
      <button onclick="loadTasks()">LOAD DATA</button>
    </div>

    <div id="taskList"></div>
  </div>
</div>

<!-- AUTO SCREEN -->
<div id="autoScreen" class="screen">
  <div class="container">
    <div class="panel">
      <div class="header">AUTO FEEDBACK PROTOCOL</div>

      <button onclick="startAuto()">🚀 START AUTO FEEDBACK</button>
      <button class="btn-stop" onclick="stopAuto()">⛔ STOP PROCESS</button>

      <div id="progressText" style="text-align:center; margin:15px 0; font-weight:bold;">0 / 0</div>
      <div class="progress-bar">
        <div id="progressFill" class="progress-fill"></div>
      </div>
    </div>

    <div class="panel">
      <div class="header">PROCESS LOG</div>
      <div id="log" class="log"></div>
    </div>
  </div>
</div>

<div class="bottom-nav">
  <button onclick="goHome()">🏠<br>Home</button>
  <button onclick="goAuto()">⚡<br>Auto</button>
  <button onclick="loadNotif()">🔔<br>Notif</button>
</div>

<script>
const BASE="https://auto-feedback-backend-1.onrender.com";
let user="";
let stopFlag=false;

function showLoading(s){
  document.getElementById("loading").style.display = s ? "flex" : "none";
}

function toast(msg){
  let t = document.getElementById("toast");
  t.innerText = msg;
  t.style.display = "block";
  setTimeout(() => t.style.display = "none", 2500);
}

function showScreen(id){
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function log(msg, type="info"){
  let el = document.getElementById("log");
  let cls = "log-" + type;
  el.innerHTML += `<div class="${cls}">• ${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

// LOGIN - DENGAN LOADING
async function login(){
  const accountInput = document.getElementById("account").value.trim();
  if (!accountInput) {
    toast("Masukkan Account ID");
    return;
  }

  user = accountInput;

  showLoading(true);        // ← Loading muncul saat tombol ACCESS diklik

  try {
    let res = await fetch(BASE+"/login",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        account: user,
        password: document.getElementById("password").value
      })
    });

    let data = await res.json();

    showLoading(false);       // ← Loading disembunyikan setelah proses selesai

    if(data.success){
      toast("ACCESS GRANTED");
      showScreen("homeScreen");
      loadTasks();            // Langsung load data setelah login berhasil
    } else {
      toast("ACCESS DENIED");
    }
  } catch (err) {
    showLoading(false);
    toast("KONEKSI ERROR");
    console.error(err);
  }
}

// LOAD TASKS
async function loadTasks(){
  showLoading(true);

  let res = await fetch(BASE+"/tasks/"+user);
  let result = await res.json();
  showLoading(false);

  let total=0, ready=0, skip=0;
  let list = document.getElementById("taskList");
  list.innerHTML = "";

  (result.data || []).forEach(t => {
    total++;
    let isReady = (t.diffDays >= 10);
    if(isReady) ready++; else skip++;

    list.innerHTML += `
      <div class="task-card">
        <div class="task-header">
          <div class="avatar">👤</div>
          <div>
            <b>${t.userName || 'Debitur'}</b><br>
            <span style="color:#00ff9c; font-size:13px;">● Sedang Diproses [Akulaku]</span>
          </div>
        </div>
        <div class="info-row">
          <span>Hari sejak feedback</span>
          <span style="color:\( {isReady ? '#00ff9c' : 'orange'}"> \){t.diffDays || 0} hari</span>
        </div>
        <div class="tunggakan">
          Rp ${t.formatDebt || t.tunggakanAmount || '0'}
        </div>
        \( {t.dpd ? `<div class="info-row"><span>DPD</span><span> \){t.dpd}</span></div>` : ''}
      </div>
    `;
  });

  document.getElementById("total").innerText = total;
  document.getElementById("ready").innerText = ready;
  document.getElementById("skip").innerText = skip;
}

// AUTO FEEDBACK
async function startAuto(){
  stopFlag = false;
  showScreen("autoScreen");
  log("Auto Feedback Protocol Started", "info");

  showLoading(true);
  let res = await fetch(BASE+"/tasks/"+user);
  let data = await res.json();
  showLoading(false);

  let tasks = data.data || [];
  let total = tasks.length;
  let done = 0;

  document.getElementById("progressText").innerText = `0 / ${total}`;
  document.getElementById("progressFill").style.width = "0%";

  for(let t of tasks){
    if(stopFlag){
      log("Process dihentikan", "error");
      break;
    }

    log(`Memeriksa \( {t.userName} ( \){t.diffDays} hari)`, "info");

    if((t.diffDays || 0) < 10){
      log("Diskip - Belum 10 hari", "skip");
      continue;
    }

    await fetch(BASE+"/auto-feedback/"+user);

    done++;
    let percent = (done / total) * 100;

    document.getElementById("progressText").innerText = `${done} / ${total}`;
    document.getElementById("progressFill").style.width = percent + "%";

    log(`✅ Feedback terkirim ke ${t.userName}`, "success");

    await new Promise(r => setTimeout(r, 1000));
  }

  document.getElementById("done").innerText = done;
  log("Auto Feedback selesai dijalankan", "success");
  toast("AUTO FEEDBACK SELESAI");
}

function stopAuto(){
  stopFlag = true;
  toast("PROCESS STOPPED");
}

function goHome(){ showScreen("homeScreen"); }
function goAuto(){ showScreen("autoScreen"); }

async function loadNotif(){
  let res = await fetch(BASE+"/notif/"+user);
  let data = await res.json();
  toast(`Notifikasi: ${data.data ? data.data.length : 0}`);
}
</script>

</body>
</html>
