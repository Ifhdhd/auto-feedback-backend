<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cyber System</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#02040a;
  color:white;
}

/* GRID */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background-image:
    linear-gradient(rgba(255,0,0,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,0,0,0.05) 1px, transparent 1px);
  background-size:40px 40px;
}

/* SCREEN */
.screen{display:none;height:100vh;overflow:auto;}
.active{display:block;}
.container{padding:15px;padding-bottom:90px;}

/* PANEL */
.panel{
  background:rgba(10,15,30,0.6);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,0,0,0.2);
  border-radius:12px;
  padding:12px;
  margin-bottom:10px;
  box-shadow:0 0 10px rgba(255,0,0,0.2);
}

/* HEADER */
.header{
  color:red;
  margin-bottom:8px;
  text-shadow:0 0 10px red;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  margin-top:8px;
  background:linear-gradient(90deg, red, darkred);
  color:white;
  font-weight:bold;
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:1px solid #111;
  background:#0b1120;
  color:white;
}

/* STATS */
.stats{
  display:flex;
  gap:10px;
}
.stat{
  flex:1;
  text-align:center;
  background:rgba(0,0,0,0.4);
  padding:10px;
  border-radius:10px;
}
.stat b{
  color:red;
  font-size:18px;
}

/* CARD */
.card{
  background:rgba(0,0,0,0.4);
  padding:10px;
  border-radius:10px;
  margin-bottom:8px;
}

.dot{
  width:8px;height:8px;border-radius:50%;
  display:inline-block;margin-right:5px;
}

/* PROGRESS */
.progress-bar{
  height:10px;
  background:#111;
  border-radius:10px;
  overflow:hidden;
  margin-top:8px;
}
.progress-fill{
  height:100%;
  width:0%;
  background:red;
}

/* LOG */
.log{
  background:rgba(0,0,0,0.6);
  border-radius:10px;
  padding:10px;
  height:220px;
  overflow:auto;
  font-size:13px;
}

.log-success{color:#00ff9c;}
.log-skip{color:orange;}
.log-error{color:red;}
.log-info{color:#aaa;}

/* NAV */
.bottom-nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#05070f;
}
.bottom-nav button{
  flex:1;
  background:none;
  color:#aaa;
}

/* LOADING */
.loading{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
  align-items:center;
  justify-content:center;
}
.spinner{
  width:40px;height:40px;
  border:4px solid #222;
  border-top:4px solid red;
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin{100%{transform:rotate(360deg);}}
</style>
</head>

<body>

<div id="loading" class="loading"><div class="spinner"></div></div>

<!-- LOGIN -->
<div id="loginScreen" class="screen active">
  <div class="container">
    <div class="panel">
      <div class="header">LOGIN</div>
      <input id="account" placeholder="Account">
      <input id="password" type="password" placeholder="Password">
      <button onclick="login()">LOGIN</button>
    </div>
  </div>
</div>

<!-- HOME -->
<div id="homeScreen" class="screen">
  <div class="container">

    <div class="panel">
      <div class="header">SYSTEM STATUS</div>
      <div class="stats">
        <div class="stat"><b id="total">0</b><br>Total</div>
        <div class="stat"><b id="ready">0</b><br>Ready</div>
        <div class="stat"><b id="skip">0</b><br>Skip</div>
        <div class="stat"><b id="done">0</b><br>Done</div>
      </div>
      <button onclick="loadTasks()">SYNC DATA</button>
    </div>

    <div id="taskList"></div>

  </div>
</div>

<!-- AUTO -->
<div id="autoScreen" class="screen">
  <div class="container">

    <div class="panel">
      <div class="header">AUTO EXECUTION</div>

      <button onclick="startAuto()">START</button>
      <button onclick="stopAuto()">STOP</button>

      <div id="progressText">0 / 0</div>
      <div class="progress-bar">
        <div id="progressFill" class="progress-fill"></div>
      </div>
    </div>

    <div class="panel">
      <div class="header">PROCESS LOG</div>
      <div id="log" class="log"></div>
    </div>

  </div>
</div>

<div class="bottom-nav">
  <button onclick="goHome()">🏠<br>Home</button>
  <button onclick="goAuto()">⚡<br>Auto</button>
</div>

<script>

const BASE="https://auto-feedback-backend-1.onrender.com";
let user="";
let stopFlag=false;

function showLoading(s){
  document.getElementById("loading").style.display=s?"flex":"none";
}

function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function log(msg,type="info"){
  let el=document.getElementById("log");
  let cls="log-"+type;
  el.innerHTML+=`<div class="${cls}">• ${msg}</div>`;
  el.scrollTop=el.scrollHeight;
}

// LOGIN
async function login(){
  user=document.getElementById("account").value;

  showLoading(true);

  let res=await fetch(BASE+"/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      account:user,
      password:document.getElementById("password").value
    })
  });

  let data=await res.json();
  showLoading(false);

  if(data.success){
    showScreen("homeScreen");
  }else{
    alert("Login gagal");
  }
}

// LOAD TASK
async function loadTasks(){
  showLoading(true);

  let res=await fetch(BASE+"/tasks/"+user);
  let data=await res.json();

  showLoading(false);

  let total=0,ready=0,skip=0;

  let list=document.getElementById("taskList");
  list.innerHTML="";

  data.data.forEach(t=>{
    total++;
    let ok=t.diffDays>=10;

    if(ok) ready++; else skip++;

    let color=ok?"red":"lime";

    list.innerHTML+=`
      <div class="card">
        <span class="dot" style="background:${color}"></span>
        <b>${t.userName}</b>
        <div>${t.diffDays} hari</div>
      </div>
    `;
  });

  document.getElementById("total").innerText=total;
  document.getElementById("ready").innerText=ready;
  document.getElementById("skip").innerText=skip;
}

// AUTO
async function startAuto(){

  stopFlag=false;
  showScreen("autoScreen");

  log("Start auto feedback","info");

  let res=await fetch(BASE+"/tasks/"+user);
  let data=await res.json();

  let tasks=data.data||[];
  let total=tasks.length;
  let done=0;

  for(let t of tasks){

    if(stopFlag){
      log("Stopped","error");
      break;
    }

    log("Check "+t.userName+" ("+t.diffDays+" hari)","info");

    if(t.diffDays<10){
      log("Skip","skip");
      continue;
    }

    await fetch(BASE+"/auto-feedback/"+user);

    done++;

    let percent=(done/total)*100;
    document.getElementById("progressText").innerText=done+" / "+total;
    document.getElementById("progressFill").style.width=percent+"%";

    log("Success","success");

    await new Promise(r=>setTimeout(r,1000));
  }

  document.getElementById("done").innerText=done;

  log("Finished","success");
}

function stopAuto(){
  stopFlag=true;
}

function goHome(){showScreen("homeScreen");}
function goAuto(){showScreen("autoScreen");}

</script>

</body>
</html>
