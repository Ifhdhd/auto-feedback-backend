<!DOCTYPE html>
<html lang="id">
<head>
  <title>Auto Feedback Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --primary: #ff2d55;
      --accent: #00ff9d;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #0a0e1a 0%, #05070f 100%);
      color: #e0e0ff;
      min-height: 100vh;
      overflow: hidden;
    }

    .screen {
      display: none;
      height: 100vh;
      overflow-y: auto;
      padding-bottom: 80px;
    }

    .active {
      display: block;
    }

    .container {
      padding: 20px;
    }

    .header {
      font-size: 24px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 25px;
      background: linear-gradient(90deg, #ff2d55, #ff8a00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    input {
      width: 100%;
      padding: 16px 18px;
      margin: 12px 0;
      border-radius: 16px;
      border: none;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      color: white;
      font-size: 16px;
    }

    input::placeholder {
      color: #888;
    }

    button {
      width: 100%;
      padding: 16px;
      margin: 12px 0;
      border-radius: 16px;
      border: none;
      background: linear-gradient(90deg, var(--primary), #ff6b00);
      color: white;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 15px rgba(255, 45, 85, 0.4);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(255, 45, 85, 0.5);
    }

    .card {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 14px;
      transition: all 0.3s;
    }

    .card:hover {
      transform: translateY(-3px);
      border-color: rgba(255,45,85,0.3);
    }

    .row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    /* Bottom Navigation */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(10, 14, 26, 0.95);
      backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255,255,255,0.1);
      display: flex;
      padding: 8px 0;
      z-index: 1000;
    }

    .bottom-nav button {
      flex: 1;
      background: none;
      border: none;
      color: #aaa;
      font-size: 11px;
      padding: 8px 0;
      transition: all 0.3s;
    }

    .bottom-nav button.active {
      color: white;
      text-shadow: 0 0 10px var(--primary);
    }

    /* Notification Drawer */
    #notifDrawer {
      position: fixed;
      top: 0;
      right: -100%;
      width: 85%;
      max-width: 380px;
      height: 100vh;
      background: #0f1628;
      box-shadow: -5px 0 20px rgba(0,0,0,0.6);
      transition: right 0.4s cubic-bezier(0.32, 0.72, 0, 1);
      z-index: 2000;
      overflow-y: auto;
    }

    #notifDrawer.open {
      right: 0;
    }

    .drawer-header {
      padding: 20px;
      background: linear-gradient(90deg, #1a2338, #2a1b3d);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .log-item {
      padding: 14px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      font-size: 14px;
    }

    .log-time {
      font-size: 12px;
      color: #00ff9d;
      margin-top: 4px;
    }

    /* Loading */
    .loading {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(5,7,15,0.9);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 3000;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid #1a2338;
      border-top: 5px solid var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(30, 41, 59, 0.95);
      color: white;
      padding: 14px 24px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      display: none;
      z-index: 2500;
      font-weight: 500;
    }
  </style>
</head>
<body>

<div id="loading" class="loading">
  <div class="spinner"></div>
</div>

<div id="toast" class="toast"></div>

<!-- LOGIN -->
<div id="loginScreen" class="screen active">
  <div class="container" style="padding-top: 80px;">
    <h1 style="text-align:center; font-size:28px; margin-bottom:40px;">Auto Feedback</h1>
    <div class="card">
      <input id="account" placeholder="Nomor HP / Akun">
      <input id="password" type="password" placeholder="Password">
      <button onclick="login()">MASUK</button>
    </div>
  </div>
</div>

<!-- HOME -->
<div id="homeScreen" class="screen">
  <div class="container">
    <div class="header">DASHBOARD</div>
    <button onclick="loadTasks()">🔄 LOAD TASK</button>
    <div id="taskList"></div>
  </div>
</div>

<!-- AUTO -->
<div id="autoScreen" class="screen">
  <div class="container">
    <div class="header">AUTO FEEDBACK</div>
    <button onclick="startAuto()">⚡ MULAI AUTO FEEDBACK</button>

    <div class="card">
      <div id="progressText" style="font-size:18px; font-weight:600; margin-bottom:8px;">0 / 0</div>
      <div class="progress-bar" style="height:12px; background:#1a2338; border-radius:999px; overflow:hidden;">
        <div id="progressFill" style="height:100%; width:0%; background:linear-gradient(90deg, #ff2d55, #ff8a00); transition: width 0.4s;"></div>
      </div>
    </div>

    <div id="successList"></div>
  </div>
</div>

<!-- Notification Drawer -->
<div id="notifDrawer">
  <div class="drawer-header">
    <h3>📋 Log Auto Feedback</h3>
    <button onclick="closeNotif()" style="background:none; border:none; font-size:24px; color:#aaa;">✕</button>
  </div>
  <div id="notifContent">
    <!-- Log akan diisi via JavaScript -->
  </div>
</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <button onclick="goHome()" id="navHome">🏠<br>Home</button>
  <button onclick="goAuto()" id="navAuto">⚡<br>Auto</button>
  <button onclick="openNotif()" id="navNotif">🔔<br>Notif</button>
</div>

<script>
const BASE = "https://auto-feedback-backend-1.onrender.com";
let user = "";

// UI Functions
function showLoading(show) {
  document.getElementById("loading").style.display = show ? "flex" : "none";
}

function toast(msg) {
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.style.display = "block";
  setTimeout(() => t.style.display = "none", 2500);
}

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  // Update active nav
  document.querySelectorAll(".bottom-nav button").forEach(btn => btn.classList.remove("active"));
  if(id === "homeScreen") document.getElementById("navHome").classList.add("active");
  if(id === "autoScreen") document.getElementById("navAuto").classList.add("active");
}

// Login
async function login() {
  user = document.getElementById("account").value.trim();
  const pass = document.getElementById("password").value;

  if (!user || !pass) return toast("Mohon isi akun dan password");

  showLoading(true);
  try {
    const res = await fetch(BASE + "/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ account: user, password: pass })
    });
    const data = await res.json();
    
    if (data.success) {
      toast("✅ Login berhasil");
      showScreen("homeScreen");
    } else {
      toast("❌ Login gagal");
    }
  } catch(e) {
    toast("Koneksi error");
  }
  showLoading(false);
}

// Load Tasks
async function loadTasks() {
  showLoading(true);
  try {
    const res = await fetch(BASE + "/tasks/" + user);
    const data = await res.json();

    const list = document.getElementById("taskList");
    list.innerHTML = "";

    data.data.forEach(t => {
      const color = (t.diffDays >= 10) ? "#ff2d55" : "#00ff9d";
      list.innerHTML += `
        <div class="card">
          <div class="row">
            <div class="dot" style="background:${color}"></div>
            <b>${t.userName}</b>
          </div>
          <div style="margin-top:6px; color:#aaa;">${t.diffDays} hari lagi</div>
        </div>
      `;
    });
  } catch(e) {
    toast("Gagal memuat task");
  }
  showLoading(false);
}

// Start Auto
async function startAuto() {
  showScreen("autoScreen");
  showLoading(true);

  try {
    const res = await fetch(BASE + "/tasks/" + user);
    const data = await res.json();
    let tasks = data.data || [];
    let total = tasks.length;
    let done = 0;

    document.getElementById("successList").innerHTML = "";

    for (let t of tasks) {
      if ((t.diffDays || 0) < 10) continue;

      await fetch(BASE + "/auto-feedback/" + user);
      
      done++;
      const percent = Math.round((done / total) * 100);

      document.getElementById("progressText").innerText = `${done} / ${total}`;
      document.getElementById("progressFill").style.width = percent + "%";

      document.getElementById("successList").innerHTML += `
        <div class="card">✅ ${t.userName} - Berhasil</div>
      `;
    }

    toast("Auto Feedback selesai!");
  } catch(e) {
    toast("Terjadi kesalahan saat auto");
  }
  showLoading(false);
}

// Notification Drawer
function openNotif() {
  document.getElementById("notifDrawer").classList.add("open");
  loadNotifLog();
}

function closeNotif() {
  document.getElementById("notifDrawer").classList.remove("open");
}

async function loadNotifLog() {
  const content = document.getElementById("notifContent");
  content.innerHTML = "<div style='padding:20px; text-align:center; color:#666;'>Loading log...</div>";

  try {
    const res = await fetch(BASE + "/notif/" + user);
    const data = await res.json();

    if (!data.data || data.data.length === 0) {
      content.innerHTML = "<div style='padding:30px; text-align:center; color:#777;'>Belum ada log feedback</div>";
      return;
    }

    let html = "";
    data.data.forEach(item => {
      html += `
        <div class="log-item">
          <div>${item.message || 'Auto feedback berhasil'}</div>
          <div class="log-time">${new Date().toLocaleString('id-ID')}</div>
        </div>
      `;
    });
    content.innerHTML = html;
  } catch(e) {
    content.innerHTML = "<div style='padding:20px; color:#f66;'>Gagal memuat log</div>";
  }
}

// Navigation
function goHome() { showScreen("homeScreen"); }
function goAuto() { showScreen("autoScreen"); }

// Close drawer when clicking outside
document.getElementById("notifDrawer").addEventListener('click', function(e) {
  if (e.target === this) closeNotif();
});
</script>

</body>
</html>
