<!DOCTYPE html>
<html>
<head>
  <title>Auto Feedback</title>
  <style>
    body { font-family: Arial; background:#111; color:#fff; }
    .card {
      background:#1e1e1e;
      margin:10px;
      padding:10px;
      border-radius:8px;
    }
  </style>
</head>
<body>

<h3>Login</h3>
<input id="a" placeholder="account"><br>
<input id="p" placeholder="password"><br>
<button onclick="login()">Login</button>

<hr>

<button onclick="loadTasks()">Load Task</button>
<button onclick="runAuto()">Auto Feedback</button>
<button onclick="loadNotif()">Notif</button>

<div id="list"></div>

<script>
let user="";

function getDotColor(diff){
  return diff >= 10 ? "red" : "green";
}

async function login(){
  user = document.getElementById("a").value;

  await fetch("/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      account:user,
      password:document.getElementById("p").value
    })
  });

  alert("Login OK");
}

async function loadTasks(){
  const res = await fetch("/tasks/"+user);
  const data = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.data.forEach(t=>{
    const color = getDotColor(t.diffDays || 0);

    list.innerHTML += `
      <div class="card">
        <div style="display:flex;align-items:center;">
          <div style="
            width:10px;
            height:10px;
            border-radius:50%;
            background:${color};
            margin-right:8px;"></div>

          <b>${t.userName}</b>
        </div>

        <div>Debt: ${t.formatDebt}</div>
        <div>DPD: ${t.dpd}</div>
        <div>Terakhir feedback: ${t.diffDays} hari lalu</div>
      </div>
    `;
  });
}

async function runAuto(){
  await fetch("/auto-feedback/"+user);
  alert("Auto selesai");
}

async function loadNotif(){
  const res = await fetch("/notif/"+user);
  const data = await res.json();

  alert(JSON.stringify(data.data,null,2));
}
</script>

</body>
</html>
