<!DOCTYPE html>
<html lang="id">
<head>
  <title>Auto Feedback Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --primary: #ff2d55;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #0a0e1a 0%, #05070f 100%);
      color: #e0e0ff;
      min-height: 100vh;
      overflow: hidden;
    }

    .screen { display: none; height: 100vh; overflow-y: auto; padding-bottom: 80px; }
    .active { display: block; }

    .container { padding: 20px; }

    .header {
      font-size: 26px;
      font-weight: 700;
      text-align: center;
      margin: 60px 0 40px 0;
      background: linear-gradient(90deg, #ff2d55, #ff8a00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* LOGIN STYLE - Diperbaiki */
    #loginScreen .card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 30px 25px;
      margin: 0 auto;
      max-width: 340px;
    }

    input {
      width: 100%;
      padding: 16px 18px;
      margin: 12px 0;
      border-radius: 12px;
      border: none;
      background: rgba(255,255,255,0.1);
      color: white;
      font-size: 16px;
    }

    input::placeholder { color: #888; }

    button {
      width: 100%;
      padding: 16px;
      margin-top: 20px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(90deg, #ff2d55, #ff6b00);
      color: white;
      font-weight: 700;
      font-size: 17px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(255, 45, 85, 0.5);
    }

    /* Card untuk Dashboard & Auto */
    .data-card {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 14px;
      display: flex;
      gap: 14px;
    }

    .avatar {
      width: 62px;
      height: 62px;
      border-radius: 12px;
      object-fit: cover;
      border: 2px solid rgba(255,45,85,0.4);
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      margin: 6px 0;
      font-size: 14.5px;
    }

    .label { color: #888; width: 80px; flex-shrink: 0; }
    .value { color: white; font-weight: 500; text-align: right; flex: 1; word-break: break-word; }

    .status {
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12.5px;
      font-weight: bold;
    }

    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: rgba(10, 14, 26, 0.95);
      backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255,255,255,0.1);
      display: flex;
      padding: 10px 0 8px 0;
      z-index: 1000;
    }

    .bottom-nav button {
      flex: 1;
      background: none;
      border: none;
      color: #aaa;
      font-size: 11px;
      padding: 6px 0;
    }

    .bottom-nav button.active { color: white; }

    /* Notification Drawer */
    #notifDrawer {
      position: fixed;
      top: 0; right: -100%;
      width: 85%; max-width: 380px;
      height: 100vh;
      background: #0f1628;
      box-shadow: -5px 0 20px rgba(0,0,0,0.6);
      transition: right 0.4s cubic-bezier(0.32, 0.72, 0, 1);
      z-index: 2000;
      overflow-y: auto;
    }

    #notifDrawer.open { right: 0; }

    .drawer-header {
      padding: 20px;
      background: linear-gradient(90deg, #1a2338, #2a1b3d);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .log-item {
      padding: 16px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      gap: 12px;
    }

    .loading, .toast { /* ... tetap sama */ }
    .loading { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(5,7,15,0.9); display: none; align-items:center; justify-content:center; z-index: 3000; }
    .spinner { width: 50px; height: 50px; border: 5px solid #1a2338; border-top: 5px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
      background: rgba(30, 41, 59, 0.95); color: white;
      padding: 14px 24px; border-radius: 12px; display: none; z-index: 2500;
    }
  </style>
</head>
<body>

<div id="loading" class="loading"><div class="spinner"></div></div>
<div id="toast" class="toast"></div>

<!-- LOGIN - Diperbaiki -->
<div id="loginScreen" class="screen active">
  <div class="container" style="padding-top: 80px;">
    <h1 class="header">Auto Feedback Pro</h1>
    
    <div class="card" style="max-width: 340px; margin: 0 auto;">
      <input id="account" placeholder="Nomor HP / Akun">
      <input id="password" type="password" placeholder="Password">
      <button onclick="login()">MASUK</button>
    </div>
  </div>
</div>

<!-- HOME -->
<div id="homeScreen" class="screen">
  <div class="container">
    <div class="header">DASHBOARD</div>
    <button onclick="loadTasks()">🔄 LOAD TASK</button>
    <div id="taskList"></div>
  </div>
</div>

<!-- AUTO FEEDBACK -->
<div id="autoScreen" class="screen">
  <div class="container">
    <div class="header">AUTO FEEDBACK</div>
    <button onclick="startAuto()">⚡ MULAI AUTO FEEDBACK</button>

    <div class="card" style="flex-direction:column; max-width: 340px; margin: 0 auto;">
      <div id="progressText" style="font-size:18px; font-weight:600; margin-bottom:8px;">0 / 0</div>
      <div style="height:12px; background:#1a2338; border-radius:999px; overflow:hidden;">
        <div id="progressFill" style="height:100%; width:0%; background:linear-gradient(90deg, #ff2d55, #ff8a00); transition: width 0.4s;"></div>
      </div>
    </div>

    <div id="successList"></div>
  </div>
</div>

<!-- NOTIF DRAWER -->
<div id="notifDrawer">
  <div class="drawer-header">
    <h3>📋 Log Auto Feedback</h3>
    <button onclick="closeNotif()" style="background:none;border:none;font-size:24px;color:#aaa;">✕</button>
  </div>
  <div id="notifContent"></div>
</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <button onclick="goHome()" id="navHome">🏠<br>Home</button>
  <button onclick="goAuto()" id="navAuto">⚡<br>Auto</button>
  <button onclick="openNotif()" id="navNotif">🔔<br>Notif</button>
</div>

<script>
const BASE = "https://auto-feedback-backend-1.onrender.com";
let user = "";

function showLoading(show) {
  document.getElementById("loading").style.display = show ? "flex" : "none";
}

function toast(msg) {
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.style.display = "block";
  setTimeout(() => t.style.display = "none", 2500);
}

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  document.querySelectorAll(".bottom-nav button").forEach(btn => btn.classList.remove("active"));
  if(id === "homeScreen") document.getElementById("navHome").classList.add("active");
  if(id === "autoScreen") document.getElementById("navAuto").classList.add("active");
}

function getAlamat(t) {
  if (!t.addressBo) return '-';
  const a = t.addressBo;
  let alamat = a.street || '';
  if (a.district) alamat += `, ${a.district}`;
  if (a.city) alamat += `, ${a.city}`;
  if (a.province) alamat += `, ${a.province}`;
  return alamat || '-';
}

function getPhoto(t) {
  return t.handHoldPhoto || t.idPhoto || "https://via.placeholder.com/62?text=👤";
}

// LOGIN
async function login() {
  user = document.getElementById("account").value.trim();
  const pass = document.getElementById("password").value;

  if (!user || !pass) return toast("Mohon isi akun dan password");

  showLoading(true);
  try {
    const res = await fetch(BASE + "/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ account: user, password: pass })
    });
    const data = await res.json();

    if (data.success) {
      toast("✅ Login berhasil");
      showScreen("homeScreen");
      loadTasks();
    } else {
      toast("❌ Login gagal");
    }
  } catch(e) {
    toast("Koneksi error");
  }
  showLoading(false);
}

// LOAD TASKS + FOTO
async function loadTasks() {
  showLoading(true);
  try {
    const res = await fetch(BASE + "/tasks/" + user);
    const json = await res.json();
    const tasks = json.data?.data || [];

    const list = document.getElementById("taskList");
    list.innerHTML = "";

    if (tasks.length === 0) {
      list.innerHTML = `<div class="data-card" style="text-align:center;color:#888;">Tidak ada task</div>`;
      return;
    }

    tasks.forEach(t => {
      const isUrgent = (t.taskRemainDay || 0) <= 0;
      const alamat = getAlamat(t);
      const photo = getPhoto(t);

      list.innerHTML += `
        <div class="data-card">
          <img src="${photo}" class="avatar" alt="foto">
          <div class="info">
            <div style="font-weight:600;">${t.userName || '-'}</div>
            <div class="info-row">
              <span class="label">Alamat</span>
              <span class="value">${alamat}</span>
            </div>
            <div class="info-row">
              <span class="label">Sisa Hari</span>
              <span class="value" style="color:\( {isUrgent ? '#ff2d55' : '#00ff9d'}"> \){t.taskRemainDay || 0} hari</span>
            </div>
            <div style="margin-top:8px;text-align:right;">
              <span class="status" style="background:\( {isUrgent ? '#ff2d5520' : '#00ff9d20'}; color: \){isUrgent ? '#ff6b6b' : '#00ff9d'}">
                ${isUrgent ? '⚠️ Perlu Feedback' : '✅ Aman'}
              </span>
            </div>
          </div>
        </div>
      `;
    });
  } catch(e) {
    toast("Gagal memuat task");
  }
  showLoading(false);
}

// START AUTO + FOTO
async function startAuto() {
  showScreen("autoScreen");
  showLoading(true);

  try {
    const res = await fetch(BASE + "/tasks/" + user);
    const json = await res.json();
    let tasks = json.data?.data || [];
    let total = tasks.length;
    let done = 0;

    document.getElementById("successList").innerHTML = "";

    for (let t of tasks) {
      if ((t.taskRemainDay || 0) > 0) continue;

      await fetch(BASE + "/auto-feedback/" + user);
      done++;

      const percent = Math.round((done / total) * 100);
      document.getElementById("progressText").innerText = `${done} / ${total}`;
      document.getElementById("progressFill").style.width = percent + "%";

      const alamat = getAlamat(t);
      const photo = getPhoto(t);

      document.getElementById("successList").innerHTML += `
        <div class="data-card">
          <img src="${photo}" class="avatar" alt="foto">
          <div class="info">
            <div style="font-weight:600;">${t.userName || '-'}</div>
            <div class="info-row">
              <span class="label">Alamat</span>
              <span class="value">${alamat}</span>
            </div>
            <div class="info-row">
              <span class="label">Status</span>
              <span class="value" style="color:#00ff9d">✅ Berhasil</span>
            </div>
          </div>
        </div>
      `;
    }
    toast(`Auto selesai! ${done} feedback berhasil`);
  } catch(e) {
    toast("Terjadi kesalahan");
  }
  showLoading(false);
}

// Notif functions (sama seperti sebelumnya)
async function loadNotifLog() { /* ... sama seperti kode sebelumnya */ }
function openNotif() { document.getElementById("notifDrawer").classList.add("open"); loadNotifLog(); }
function closeNotif() { document.getElementById("notifDrawer").classList.remove("open"); }
function goHome() { showScreen("homeScreen"); }
function goAuto() { showScreen("autoScreen"); }
</script>

</body>
</html>
