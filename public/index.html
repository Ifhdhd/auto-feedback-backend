<!DOCTYPE html>
<html>
<head>
  <title>Auto Feedback</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #02040a;
      color: #fff;
    }

    .screen {
      display: none;
      height: 100vh;
      overflow: auto;
    }

    .active {
      display: block;
    }

    .container {
      padding: 20px;
      padding-bottom: 90px;
    }

    /* HEADER */
    .header {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 15px;
      color: red;
      text-shadow: 0 0 10px red;
    }

    /* INPUT */
    input {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      border-radius: 12px;
      border: 1px solid #111;
      background: #0b1120;
      color: white;
      outline: none;
    }

    /* BUTTON */
    button {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      margin-top: 10px;
      background: linear-gradient(90deg, red, darkred);
      color: white;
      font-weight: bold;
      box-shadow: 0 0 10px red;
    }

    .btn-stop {
      background: #111;
      box-shadow: 0 0 5px #333;
    }

    /* CARD */
    .card {
      background: #0b1120;
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 10px;
      border: 1px solid #111;
      box-shadow: 0 0 10px rgba(255,0,0,0.2);
    }

    .row {
      display: flex;
      align-items: center;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 8px;
      box-shadow: 0 0 6px currentColor;
    }

    /* NAV */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #05070f;
      display: flex;
      border-top: 1px solid #111;
    }

    .bottom-nav button {
      flex: 1;
      background: none;
      color: #aaa;
      font-size: 12px;
      box-shadow: none;
    }

    /* LOADING */
    .loading {
      position: fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background: rgba(0,0,0,0.8);
      display:none;
      align-items:center;
      justify-content:center;
    }

    .spinner {
      border: 4px solid #222;
      border-top: 4px solid red;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      box-shadow: 0 0 20px red;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      background: #0b1120;
      padding: 12px 20px;
      border-radius: 8px;
      display: none;
      border: 1px solid red;
      box-shadow: 0 0 10px red;
    }

    /* PROGRESS */
    .progress-bar {
      height: 12px;
      background: #111;
      border-radius: 10px;
      overflow: hidden;
      margin-top: 10px;
      border: 1px solid red;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, red, orange);
      box-shadow: 0 0 10px red;
      transition: width 0.3s;
    }
  </style>
</head>

<body>

<div id="loading" class="loading">
  <div class="spinner"></div>
</div>

<div id="toast" class="toast"></div>

<!-- LOGIN -->
<div id="loginScreen" class="screen active">
  <div class="container">
    <div class="header">SYSTEM LOGIN</div>

    <input id="account" placeholder="No HP">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">ACCESS SYSTEM</button>
  </div>
</div>

<!-- HOME -->
<div id="homeScreen" class="screen">
  <div class="container">
    <div class="header">TARGET DATA</div>

    <button onclick="loadTasks()">LOAD TARGET</button>

    <div id="taskList"></div>
  </div>
</div>

<!-- AUTO -->
<div id="autoScreen" class="screen">
  <div class="container">
    <div class="header">AUTO EXECUTION</div>

    <button onclick="startAuto()">START</button>
    <button class="btn-stop" onclick="stopAuto()">STOP</button>

    <div class="card">
      <div id="progressText">0 / 0</div>
      <div class="progress-bar">
        <div id="progressFill" class="progress-fill"></div>
      </div>
    </div>

    <div id="successList"></div>
  </div>
</div>

<div class="bottom-nav">
  <button onclick="goHome()">🏠<br>Home</button>
  <button onclick="goAuto()">⚡<br>Auto</button>
  <button onclick="loadNotif()">🔔<br>Notif</button>
</div>

<script>

const BASE = "https://auto-feedback-backend.onrender.com";
let user = "";
let stopFlag = false;

function showLoading(s){
  document.getElementById("loading").style.display = s ? "flex" : "none";
}

function toast(msg){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.style.display = "block";
  setTimeout(()=> t.style.display="none",2000);
}

function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// LOGIN
async function login(){
  user = document.getElementById("account").value;

  showLoading(true);

  const res = await fetch(BASE + "/login",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      account:user,
      password:document.getElementById("password").value
    })
  });

  const data = await res.json();
  showLoading(false);

  if(data.success){
    toast("ACCESS GRANTED");
    showScreen("homeScreen");
  } else {
    toast("ACCESS DENIED");
  }
}

// LOAD TASK
async function loadTasks(){
  showLoading(true);

  const res = await fetch(BASE + "/tasks/" + user);
  const data = await res.json();

  const list = document.getElementById("taskList");
  list.innerHTML = "";

  data.data.forEach(t=>{
    const color = (t.diffDays >= 10) ? "red" : "lime";

    list.innerHTML += `
      <div class="card">
        <div class="row">
          <div class="dot" style="background:${color}"></div>
          <b>${t.userName}</b>
        </div>
        <div>Debt: ${t.formatDebt}</div>
        <div>DPD: ${t.dpd}</div>
        <div>${t.diffDays} hari</div>
      </div>
    `;
  });

  showLoading(false);
}

// STOP
function stopAuto(){
  stopFlag = true;
  toast("EXECUTION STOPPED");
}

// AUTO
async function startAuto(){
  stopFlag = false;

  showLoading(true);

  const res = await fetch(BASE + "/tasks/" + user);
  const data = await res.json();

  showLoading(false);

  let tasks = data.data || [];
  let total = tasks.length;
  let done = 0;

  document.getElementById("successList").innerHTML = "";

  for(let t of tasks){

    if(stopFlag) break;
    if((t.diffDays || 0) < 10) continue;

    await fetch(BASE + "/auto-feedback/" + user);

    done++;
    let percent = (done/total)*100;

    document.getElementById("progressText").innerText = done + " / " + total;
    document.getElementById("progressFill").style.width = percent + "%";

    document.getElementById("successList").innerHTML += `
      <div class="card">
        ✔ ${t.userName}
        <div>Debt: ${t.formatDebt}</div>
        <div>DPD: ${t.dpd}</div>
      </div>
    `;

    await new Promise(r=>setTimeout(r,1000));
  }

  toast("EXECUTION COMPLETE");
}

// NOTIF
async function loadNotif(){
  const res = await fetch(BASE + "/notif/" + user);
  const data = await res.json();
  toast("NOTIF: " + data.data.length);
}

// NAV
function goHome(){ showScreen("homeScreen"); }
function goAuto(){ showScreen("autoScreen"); }

</script>

</body>
</html>
